
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  #game-root {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: #0a0a0f;
    min-height: 100vh;
    padding: 1.5rem 1rem;
    color: #e8d5a0;
  }

  .game-header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .game-title {
    font-family: 'Cinzel', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: #d4a017;
    letter-spacing: 0.08em;
    text-shadow: 0 0 20px rgba(212,160,23,0.4);
    line-height: 1.2;
  }

  .game-subtitle {
    font-size: 0.95rem;
    color: #9a8a6a;
    margin-top: 0.3rem;
    font-style: italic;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: #9a8a6a;
    text-transform: uppercase;
  }

  .stat-value {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: #d4a017;
  }

  .controls {
    display: flex;
    gap: 0.8rem;
    justify-content: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    padding: 0.5rem 1.2rem;
    border: 1px solid #d4a017;
    background: transparent;
    color: #d4a017;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn:hover {
    background: #d4a017;
    color: #0a0a0f;
  }

  .btn.active {
    background: #d4a017;
    color: #0a0a0f;
  }

  .progress-bar-wrap {
    width: 100%;
    max-width: 500px;
    margin: 0 auto 1.2rem;
    height: 3px;
    background: #1a1a2e;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #d4a017, #f0c040);
    transition: width 0.5s ease;
    border-radius: 2px;
  }

  .grid {
    display: grid;
    gap: 8px;
    max-width: 900px;
    margin: 0 auto;
  }

  .grid-6 { grid-template-columns: repeat(6, 1fr); }
  .grid-8 { grid-template-columns: repeat(8, 1fr); }
  .grid-10 { grid-template-columns: repeat(10, 1fr); }

  @media (max-width: 600px) {
    .grid-6 { grid-template-columns: repeat(4, 1fr); }
    .grid-8 { grid-template-columns: repeat(4, 1fr); }
    .grid-10 { grid-template-columns: repeat(5, 1fr); }
  }

  .card {
    aspect-ratio: 1 / 1.3;
    perspective: 600px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    border-radius: 4px;
  }

  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.matched .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    padding: 4px;
  }

  .card-back {
    background: #12121e;
    border: 1px solid #2a2a3e;
  }

  .card-back::after {
    content: '✦';
    font-size: 1.1rem;
    color: #d4a01755;
  }

  .card-front {
    background: #12121e;
    border: 1px solid #d4a017;
    transform: rotateY(180deg);
    flex-direction: column;
    gap: 2px;
  }

  .card-front .verb {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.65rem, 1.8vw, 0.9rem);
    font-weight: 600;
    text-align: center;
    line-height: 1.1;
    color: #e8d5a0;
  }

  .card-front .lang-tag {
    font-family: 'Cinzel', serif;
    font-size: 0.5rem;
    letter-spacing: 0.08em;
    color: #9a8a6a;
    text-transform: uppercase;
  }

  .card-front.en { border-color: #d4a017; }
  .card-front.es { border-color: #8a6ab5; }
  .card-front.en .lang-tag { color: #d4a01799; }
  .card-front.es .lang-tag { color: #8a6ab599; }
  .card-front.es .verb { color: #d4c0f5; }

  .card.matched .card-front {
    border-color: #3a9a5a !important;
    background: #0a1a0f;
  }

  .card.matched .card-front .verb { color: #7ed4a0; }

  .card.wrong .card-inner {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%,100% { transform: rotateY(180deg) translateX(0); }
    25% { transform: rotateY(180deg) translateX(-4px); }
    75% { transform: rotateY(180deg) translateX(4px); }
  }

  .card.matched .card-inner {
    animation: pop 0.3s ease;
  }

  @keyframes pop {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.08); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  .win-banner {
    display: none;
    text-align: center;
    padding: 2rem;
    background: #0f0f1a;
    border: 1px solid #d4a017;
    border-radius: 4px;
    max-width: 400px;
    margin: 2rem auto;
  }

  .win-banner.show { display: block; }

  .win-banner h2 {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    color: #d4a017;
    margin-bottom: 0.5rem;
  }

  .win-banner p {
    color: #9a8a6a;
    font-size: 1rem;
    margin-bottom: 1rem;
  }

  .irregular-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #e05050;
    position: absolute;
    top: 4px;
    right: 4px;
  }

  .legend {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: #9a8a6a;
    font-style: italic;
  }

  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    border: 1px solid;
  }
</style>

<div id="game-root">
  <div class="game-header">
    <div class="game-title">Taller Verbs I</div>
    <div class="game-subtitle">Match each English verb with its Spanish translation</div>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-label">Pairs Found</div><div class="stat-value" id="found">0 / 0</div></div>
    <div class="stat"><div class="stat-label">Attempts</div><div class="stat-value" id="attempts">0</div></div>
    <div class="stat"><div class="stat-label">Accuracy</div><div class="stat-value" id="accuracy">—</div></div>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar" id="progress" style="width:0%"></div></div>

  <div class="controls">
    <button class="btn active" id="btn-easy" onclick="startGame('easy')">Easy (6 pairs)</button>
    <button class="btn" id="btn-medium" onclick="startGame('medium')">Medium (12 pairs)</button>
    <button class="btn" id="btn-hard" onclick="startGame('hard')">Full (24 pairs)</button>
    <button class="btn" id="btn-restart" onclick="restartGame()">↺ Restart</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="border-color:#d4a017;background:#1a1500"></div> English</div>
    <div class="legend-item"><div class="legend-swatch" style="border-color:#8a6ab5;background:#150f1a"></div> Spanish</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#e05050;border-color:#e05050;border-radius:50%;width:8px;height:8px"></div> Irregular verb</div>
  </div>

  <div class="grid grid-6" id="grid"></div>
  <div class="win-banner" id="win-banner">
    <h2>¡Excelente!</h2>
    <p id="win-msg"></p>
    <button class="btn" onclick="restartGame()">Play Again</button>
  </div>
</div>

<script>
const ALL_VERBS = [
  { en: 'study', es: 'estudiar', irregular: false },
  { en: 'read', es: 'leer', irregular: false },
  { en: 'look', es: 'mirar', irregular: false },
  { en: 'do', es: 'hacer', irregular: true },
  { en: 'have', es: 'tener', irregular: true },
  { en: 'know', es: 'saber', irregular: true },
  { en: 'carry', es: 'llevar', irregular: false },
  { en: 'decide', es: 'decidir', irregular: false },
  { en: 'wash', es: 'lavar', irregular: false },
  { en: 'eat', es: 'comer', irregular: true },
  { en: 'go', es: 'ir', irregular: true },
  { en: 'call', es: 'llamar', irregular: false },
  { en: 'want', es: 'querer', irregular: true },
  { en: 'can', es: 'poder', irregular: true },
  { en: 'search', es: 'buscar', irregular: false },
  { en: 'cook', es: 'cocinar', irregular: false },
  { en: 'work', es: 'trabajar', irregular: false },
  { en: 'live', es: 'vivir', irregular: false },
  { en: 'walk', es: 'caminar', irregular: false },
  { en: 'think', es: 'pensar', irregular: false },
  { en: 'see', es: 'ver', irregular: true },
  { en: 'sell', es: 'vender', irregular: false },
  { en: 'run', es: 'correr', irregular: false },
  { en: 'sing', es: 'cantar', irregular: false },
];

let currentMode = 'easy';
let cards = [];
let flipped = [];
let matched = 0;
let total = 0;
let attempts = 0;
let lock = false;

const MODES = { easy: 6, medium: 12, hard: 24 };
const COLS = { easy: 'grid-6', medium: 'grid-8', hard: 'grid-10' };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame(mode) {
  currentMode = mode;
  ['easy','medium','hard'].forEach(m => document.getElementById('btn-'+m).classList.remove('active'));
  document.getElementById('btn-'+mode).classList.add('active');
  matched = 0; attempts = 0; flipped = []; lock = false;

  const count = MODES[mode];
  total = count;
  const selected = shuffle(ALL_VERBS).slice(0, count);
  const grid = document.getElementById('grid');
  grid.className = 'grid ' + COLS[mode];
  document.getElementById('win-banner').classList.remove('show');

  cards = [];
  selected.forEach((v, i) => {
    cards.push({ id: i*2,   pairId: i, lang: 'en', text: v.en, irregular: v.irregular });
    cards.push({ id: i*2+1, pairId: i, lang: 'es', text: v.es, irregular: v.irregular });
  });
  cards = shuffle(cards);

  grid.innerHTML = '';
  cards.forEach(c => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.id = c.id;
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"></div>
        <div class="card-face card-front ${c.lang}">
          ${c.irregular ? '<div class="irregular-dot"></div>' : ''}
          <div class="verb">${c.text}</div>
          <div class="lang-tag">${c.lang === 'en' ? 'English' : 'Español'}</div>
        </div>
      </div>`;
    el.addEventListener('click', () => onCardClick(el, c));
    grid.appendChild(el);
  });

  updateStats();
}

function onCardClick(el, card) {
  if (lock) return;
  if (el.classList.contains('flipped') || el.classList.contains('matched')) return;
  if (flipped.length === 2) return;

  el.classList.add('flipped');
  flipped.push({ el, card });

  if (flipped.length === 2) {
    attempts++;
    lock = true;
    const [a, b] = flipped;
    if (a.card.pairId === b.card.pairId && a.card.lang !== b.card.lang) {
      setTimeout(() => {
        a.el.classList.add('matched');
        b.el.classList.add('matched');
        a.el.classList.remove('flipped');
        b.el.classList.remove('flipped');
        matched++;
        flipped = [];
        lock = false;
        updateStats();
        if (matched === total) showWin();
      }, 500);
    } else {
      setTimeout(() => {
        a.el.classList.add('wrong');
        b.el.classList.add('wrong');
        setTimeout(() => {
          a.el.classList.remove('flipped','wrong');
          b.el.classList.remove('flipped','wrong');
          flipped = [];
          lock = false;
          updateStats();
        }, 600);
      }, 700);
    }
  }
}

function updateStats() {
  document.getElementById('found').textContent = matched + ' / ' + total;
  document.getElementById('attempts').textContent = attempts;
  const acc = attempts > 0 ? Math.round((matched / attempts) * 100) + '%' : '—';
  document.getElementById('accuracy').textContent = acc;
  document.getElementById('progress').style.width = (matched / total * 100) + '%';
}

function showWin() {
  const banner = document.getElementById('win-banner');
  banner.classList.add('show');
  const acc = Math.round((matched / attempts) * 100);
  document.getElementById('win-msg').textContent =
    `You matched all ${total} pairs in ${attempts} attempts — ${acc}% accuracy!`;
}

function restartGame() { startGame(currentMode); }

startGame('easy');
</script>
