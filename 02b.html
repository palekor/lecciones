const SENTENCES = [
  // Present Simple
  {id:1, tense:"present", type:"regular",
   parts:["I","walk","to","school","every","day"],
   tip:"Present Simple describes routines, habits, and facts.",
   rule:"Present Simple: Subject + base verb. He/She/It adds -s or -es."},
  {id:2, tense:"present", type:"regular",
   parts:["She","works","at","the","hospital","because","she","likes","helping","people"],
   tip:"She works / she likes: third person singular uses -s.",
   rule:"Present Simple can connect two present facts with because."},
  {id:3, tense:"present", type:"regular",
   parts:["They","play","soccer","after","school"],
   tip:"They → base verb: play, not plays.",
   rule:"Plural subjects use the base verb in Present Simple."},
  {id:4, tense:"present", type:"irregular",
   parts:["He","goes","to","the","gym","before","work"],
   tip:"go becomes goes with he/she/it.",
   rule:"Present Simple: He/She/It + verb-s/-es + complement."},
  {id:5, tense:"present", type:"regular",
   parts:["We","study","English","and","practice","pronunciation"],
   tip:"And connects two actions with the same subject: study and practice.",

  {id:6, tense:"present", type:"irregular",
   parts:["The","dog","eats","its","food","when","it","is","hungry"],
   tip:"The dog = it, so eat becomes eats.",
   rule:"When connects a routine to a regular condition."},
  {id:7, tense:"present", type:"regular",
   parts:["You","always","talk","very","fast","but","you","speak","clearly"],
   tip:"Always goes before the main verb: always talk.",
   rule:"But connects two contrasting ideas in the same tense."},
  {id:8, tense:"present", type:"regular",
   parts:["My","brother","plays","soccer","and","my","sister","studies","music"],
   tip:"Brother plays; sister studies. Both are third person singular.",

  // Past Simple
  {id:9, tense:"past", type:"regular",
   parts:["I","walked","to","school","yesterday","because","the","bus","was","late"],
   tip:"Yesterday marks a finished past action.",
   rule:"Past Simple: Subject + past verb. Regular verbs add -ed."},
  {id:10, tense:"past", type:"regular",
   parts:["She","worked","here","last","year","but","she","moved","away"],
   tip:"Worked and moved are finished past actions.",
   rule:"Past Simple uses the same past form for all subjects."},
  {id:11, tense:"past", type:"regular",
   parts:["They","liked","the","movie","and","talked","about","it"],
   tip:"Like ends in -e, so add only -d: liked.",
   rule:"Past Simple: regular verb + -ed/-d."},
  {id:12, tense:"past", type:"irregular",
   parts:["He","went","home","after","he","finished","work"],
   tip:"Go becomes went. Never say goed.",
   rule:"After connects two finished past actions."},
  {id:13, tense:"past", type:"irregular",
   parts:["We","ate","breakfast","before","we","left"],
   tip:"Eat becomes ate; leave becomes left.",

  {id:14, tense:"past", type:"regular",
   parts:["Maria","studied","hard","so","she","passed","the","test"],
   tip:"So shows the result of the first action.",

  {id:15, tense:"past", type:"regular",
   parts:["My","mom","cooked","rice","and","beans","for","dinner"],
   tip:"Cooked is regular past: cook + ed.",

  {id:16, tense:"past", type:"irregular",
   parts:["The","students","listened","carefully","when","the","teacher","spoke"],
   tip:"Speak becomes spoke in the past.",
   rule:"When can connect two completed past actions."},

  // Present Progressive
  {id:17, tense:"presentProgressive", type:"regular",
   parts:["I","am","walking","to","school","now"],
   tip:"Now marks an action in progress at this moment.",
   rule:"Present Progressive: am/is/are + verb-ing."},
  {id:18, tense:"presentProgressive", type:"regular",
   parts:["She","is","working","at","the","office","because","the","manager","needs","help"],

   rule:"Present Progressive uses is with he/she/it."},
  {id:19, tense:"presentProgressive", type:"regular",
   parts:["They","are","playing","soccer","right","now"],
   tip:"They are + verb-ing.",
   rule:"Use are with you/we/they in Present Progressive."},
  {id:20, tense:"presentProgressive", type:"irregular",
   parts:["He","is","having","lunch","while","Maria","is","studying"],
   tip:"Have becomes having: drop -e and add -ing.",
   rule:"While connects simultaneous actions in progress."},
  {id:21, tense:"presentProgressive", type:"regular",
   parts:["We","are","studying","English","and","practicing","pronunciation"],
   tip:"Both actions are happening now: studying and practicing.",
   rule:"Present Progressive can join two -ing actions with and."},
  {id:22, tense:"presentProgressive", type:"regular",
   parts:["The","students","are","listening","to","music","while","they","are","writing"],
   tip:"The students = they, so use are.",

  {id:23, tense:"presentProgressive", type:"regular",

  {id:24, tense:"presentProgressive", type:"regular",
   parts:["You","are","speaking","slowly","so","I","can","understand","better"],

   rule:"So shows the result of the current action."},

  // Past Progressive
  {id:25, tense:"pastProgressive", type:"regular",
   parts:["I","was","walking","to","school","when","it","started","raining"],

   rule:"Past Progressive: was/were + verb-ing."},
  {id:26, tense:"pastProgressive", type:"regular",
   parts:["She","was","working","at","the","office","while","he","was","studying"],

   rule:"Use while for simultaneous past actions in progress."},
  {id:27, tense:"pastProgressive", type:"regular",
   parts:["They","were","playing","soccer","when","the","bell","rang"],
   tip:"They were + verb-ing.",
   rule:"Use Past Progressive for the longer background action."},
  {id:28, tense:"pastProgressive", type:"irregular",
   parts:["He","was","having","lunch","when","Maria","called"],
   tip:"Have becomes having; the auxiliary was marks past progressive.",
   rule:"Past Progressive often combines with Past Simple using when."},
  {id:29, tense:"pastProgressive", type:"regular",
   parts:["We","were","studying","English","while","the","teacher","was","explaining","grammar"],
   tip:"We were; teacher was.",
   rule:"Was/were depends on the subject; the -ing verb does not change."},
  {id:30, tense:"pastProgressive", type:"regular",
   parts:["The","students","were","listening","to","music","when","the","principal","entered"],

   rule:"When often introduces the shorter interrupting action."},
  {id:31, tense:"pastProgressive", type:"regular",
   parts:["My","brother","was","playing","soccer","but","my","sister","was","reading"],
   tip:"Was + verb-ing for singular subjects.",
   rule:"But contrasts two past actions in progress."},
  {id:32, tense:"pastProgressive", type:"regular",
   parts:["You","were","speaking","fast","so","I","was","taking","notes"],
   tip:"You were + verb-ing.",
   rule:"So connects a past situation to its result."},

   prompt:"Sequence: '___ he finished homework, he watched TV.'",

  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
};

const sentenceText = sentence => sentence.parts.join(" ").replace(/\s+([,.!?;:])/g,"$1");

const canSpeak = () => typeof window !== "undefined" && "speechSynthesis" in window && "SpeechSynthesisUtterance" in window;

function speakEnglish(text, setSpeaking){
  if(!canSpeak()) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "en-US";
  utterance.rate = 0.86;
  utterance.pitch = 1;
  utterance.onend = () => setSpeaking && setSpeaking(false);
  utterance.onerror = () => setSpeaking && setSpeaking(false);
  setSpeaking && setSpeaking(true);
  window.speechSynthesis.speak(utterance);
}

function AudioButton({text,label="Listen"}){
  const [speaking,setSpeaking] = useState(false);
  const supported = canSpeak();
  return (
    <button type="button" disabled={!supported} onClick={()=>speakEnglish(text,setSpeaking)}
      className="audio-btn lift" aria-label={`Listen: ${text}`} title={supported ? text : "Audio is not supported in this browser"}>
      <span aria-hidden="true">🔊</span>
      <span>{speaking ? "Playing..." : label}</span>
    </button>
  );
}

/* ── SENTENCE BUILDER ────────────────────────────────────────────────────────── */
function SentenceBuilder({sentences, onComplete}) {
  const [qIdx,    setQIdx]    = useState(0);
  const [built,   setBuilt]   = useState([]);
  const [bank,    setBank]    = useState([]);
  const [status,  setStatus]  = useState("idle");
  const [score,   setScore]   = useState(0);
  const [streak,  setStreak]  = useState(0);
  const [showTip, setShowTip] = useState(false);
  const [shakeK,  setShakeK]  = useState(0);

  const current = sentences[qIdx];
  const meta    = TENSE_META[current.tense];
  const currentSentence = sentenceText(current);

  useEffect(() => {
    setBank(shuffle(current.parts.map((w,i) => ({w, uid:`${i}-${Math.random()}` }))));
    setBuilt([]);
    setStatus("idle");
    setShowTip(false);
  }, [qIdx]);

  const addWord = tok => {
    if(status!=="idle") return;
    setBuilt(b=>[...b,tok]);
    setBank(bk=>bk.filter(t=>t.uid!==tok.uid));
  };
  const removeWord = tok => {
    if(status!=="idle") return;
    setBuilt(b=>b.filter(t=>t.uid!==tok.uid));
    setBank(bk=>[...bk,tok]);
  };
  const check = () => {
    const ans = built.map(t=>t.w).join(" ");
    const cor = current.parts.join(" ");
    if(ans===cor){
      setStatus("correct");
      setScore(s=>s+10+Math.min(streak,5)*2);
      setStreak(s=>s+1);
    } else {
      setStatus("wrong");
      setStreak(0);
      setShakeK(k=>k+1);
    }
  };
  const reset = () => {
    setBank(shuffle(current.parts.map((w,i)=>({w,uid:`${i}-${Math.random()}`}))));
    setBuilt([]);
    setStatus("idle");
  };
  const next = () => {
    if(qIdx+1>=sentences.length){ onComplete(score+(status==="correct"?0:0)); return; }
    setQIdx(i=>i+1);
  };

  const pct = (qIdx/sentences.length)*100;

  return (
    <div className="max-w-2xl mx-auto">
      {/* Progress */}
      <div className="flex items-center gap-3 mb-4">
        <div className="flex-1 h-2 rounded-full bg-nube overflow-hidden">
          <div className="h-full meter transition-all duration-500" style={{width:`${pct}%`}}/>
        </div>
        <span className="font-mono text-xs text-bruma shrink-0">{qIdx+1}/{sentences.length}</span>
      </div>

      {/* Header chips */}
      <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
        <Pill className={`${meta.bg} border ${meta.border} ${meta.text}`}>{meta.emoji} {meta.label}</Pill>
        <div className="flex gap-2 flex-wrap">
          <Pill className="bg-white border border-tinta/10 text-tinta">{meta.aspect}</Pill>
          <Pill className="bg-white border border-tinta/10 text-tinta">{meta.time}</Pill>
          {streak>=2 && <Pill className="bg-coral/10 border border-coral/30 text-coral">🔥 {streak}</Pill>}
          <Pill className="bg-nube text-tinta">⭐ {score}</Pill>
        </div>
      </div>

      {/* Tense differentiation */}
      <div className={`rounded-2xl border p-3 mb-3 ${meta.bg} ${meta.border}`}>
        <p className="font-mono text-[0.58rem] tracking-[0.18em] uppercase text-bruma mb-2">Tense Differentiation</p>
        <div className="tense-lens-grid">
          <div className="tense-lens-box"><span className="tense-lens-label">Time</span><span className="tense-lens-value">{meta.time}</span></div>
          <div className="tense-lens-box"><span className="tense-lens-label">Aspect</span><span className="tense-lens-value">{meta.aspect}</span></div>
          <div className="tense-lens-box"><span className="tense-lens-label">Pattern</span><span className="tense-lens-value">{meta.pattern}</span></div>
          <div className="tense-lens-box"><span className="tense-lens-label">Use</span><span className="tense-lens-value">{meta.use}</span></div>
        </div>
      </div>

      {/* Rule + audio */}
      <div className={`rounded-2xl border p-3 mb-4 ${meta.bg} ${meta.border}`}>
        <p className="font-mono text-[0.58rem] tracking-[0.18em] uppercase text-bruma mb-1">Grammar Rule</p>
        <p className="text-sm text-tintasoft leading-relaxed mb-3">{current.rule}</p>
        <AudioButton text={currentSentence} label="Listen to sentence" />
      </div>

      {/* Slot zone */}
      <div key={shakeK}
        className={`rounded-[22px] border-2 p-4 mb-3 min-h-[68px] transition-all duration-200
          ${status==="correct" ? "border-menta/60 bg-menta/8"
          : status==="wrong"   ? "border-coral/60 bg-coral/8 shake"
          : "border-tinta/12 bg-nube/50"}`}>
        <div className="flex flex-wrap gap-2 min-h-[36px] items-center">
          {built.length===0 && status==="idle" && (
            <span className="text-bruma/40 text-sm font-mono italic">Tap words below to build your sentence…</span>
          )}
          {built.map(tok=>(
            <button key={tok.uid} onClick={()=>removeWord(tok)}
              className="sentence-token rounded-xl px-3 py-1.5 font-semibold text-sm bg-tinta text-lienzo lift bounce-in">
              {tok.w}
            </button>
          ))}
        </div>
      </div>

      {/* Feedback */}
      {status==="correct" && (
        <div className="rounded-xl bg-menta/12 border border-menta/30 p-3 mb-3 pop text-sm text-mentadeep font-semibold text-center">
          ✅ Perfect! <span className="font-normal text-tintasoft ml-1">{currentSentence}</span>
        </div>
      )}
      {status==="wrong" && (
        <div className="rounded-xl bg-coral/10 border border-coral/30 p-3 mb-3 pop text-sm text-coral font-semibold text-center">
          ❌ Check the order — try again!
        </div>
      )}

      {/* Word bank */}
      <div className="rounded-[22px] border border-tinta/8 bg-lienzo p-4 mb-4">
        <p className="font-mono text-[0.58rem] tracking-widest uppercase text-bruma mb-3">Word Bank — tap to place</p>
        <div className="flex flex-wrap gap-2">
          {bank.map(tok=>(
            <button key={tok.uid} onClick={()=>addWord(tok)}
              className="sentence-token rounded-xl px-3 py-2 font-semibold text-sm border bg-white border-tinta/12 text-tinta hover:border-coral/50 hover:bg-coral/5 lift">
              {tok.w}
            </button>
          ))}
          {bank.length===0 && built.length>0 && status==="idle" && (
            <span className="text-bruma text-sm italic">All placed — check your sentence above ↑</span>
          )}
        </div>
      </div>

      {/* Tip */}
      {showTip && (
        <div className="rounded-xl bg-ambar/10 border border-ambar/30 p-3 mb-3 pop text-sm text-ambardeep">
          💡 <b>Tip:</b> {current.tip}
        </div>
      )}

      {/* Actions */}
      <div className="flex gap-2 flex-wrap mobile-actions">
        {status==="idle" && (
          <>
            <button onClick={check} disabled={built.length===0}
              className="flex-1 rounded-full bg-tinta text-paper font-semibold py-3 px-5 text-sm disabled:opacity-30 lift transition">
              Check ✓
            </button>
            <button onClick={reset}
              className="rounded-full border border-tinta/15 text-tintasoft font-semibold py-3 px-4 text-sm hover:border-coral hover:text-coral transition">
              Reset
            </button>
            <button onClick={()=>setShowTip(t=>!t)}
              className="rounded-full border border-ambar/40 text-ambardeep font-semibold py-3 px-4 text-sm hover:bg-ambar/10 transition">
              💡
            </button>
          </>
        )}
        {status==="correct" && (
          <button onClick={next}
            className="flex-1 rounded-full bg-menta text-white font-semibold py-3 shadow-menta hover:bg-mentadeep transition lift">
            {qIdx+1>=sentences.length ? "See Results 🎉" : "Next →"}
          </button>
        )}
        {status==="wrong" && (
          <>
            <button onClick={reset}
              className="flex-1 rounded-full bg-coral text-white font-semibold py-3 shadow-coral hover:bg-coraldeep transition lift">
              Try Again
            </button>
            <button onClick={next}
              className="rounded-full border border-tinta/15 text-bruma font-semibold py-3 px-4 text-sm hover:text-coral transition">
              Skip →
            </button>
          </>
        )}
      </div>
    </div>
  );
}

/* ── CONNECTOR TRAINER ───────────────────────────────────────────────────────── */
function ConnectorTrainer({onComplete}) {
  const [phase,   setPhase]   = useState("learn");
  const [tabType, setTabType] = useState("Additive");
  const [cIdx,    setCIdx]    = useState(0);
  const [chosen,  setChosen]  = useState("");
  const [checked, setChecked] = useState(false);
  const [score,   setScore]   = useState(0);
  const [correct, setCorrect] = useState(0);

  const types = [...new Set(CONNECTORS.map(c=>c.type))];
  const filtered = CONNECTORS.filter(c=>c.type===tabType);

  const conn    = CONNECTORS[cIdx];
  const cc      = CONN_C[conn.color]||CONN_C.menta;
  const choices = useMemo(()=>shuffle([
    conn.blankWord,
    ...CONNECTORS.filter(x=>x.id!==conn.id).slice(0,3).map(x=>x.blankWord)
  ]), [conn.id]);

  const checkAns = () => {
    const ok = chosen.toLowerCase()===conn.blankWord.toLowerCase();
    setChecked(true);
    if(ok){ setCorrect(c=>c+1); setScore(s=>s+15); }
  };

  const next = () => {
    if(cIdx+1>=CONNECTORS.length){ onComplete(score); return; }
    setCIdx(i=>i+1);
    setChosen("");
    setChecked(false);
  };

  if(phase==="learn") return (
    <div className="max-w-2xl mx-auto">
      <Hint>Study each connector by category. Hit Practice when you feel ready.</Hint>
      <div className="flex gap-2 overflow-x-auto hide-scrollbar mb-4 pb-1">
        {types.map(t=>(
          <button key={t} onClick={()=>setTabType(t)}
            className={`shrink-0 rounded-full px-4 py-2 text-sm font-semibold transition ${tabType===t?"bg-tinta text-paper":"bg-nube text-tintasoft hover:text-coral"}`}>
            {t}
          </button>
        ))}
      </div>
      <div className="space-y-3 mb-5">
        {filtered.map(cn=>{
          const c2=CONN_C[cn.color]||CONN_C.menta;
          return (
            <div key={cn.id} className={`rounded-[22px] border p-4 ${c2.bg} ${c2.border}`}>
              <div className="flex items-center gap-3 mb-2 flex-wrap">
                <span className={`font-display font-black text-2xl ${c2.text}`}>{cn.word}</span>
                <Pill className={`${c2.bg} border ${c2.border} ${c2.text}`}>{cn.type}</Pill>
              </div>
              <p className="text-tintasoft text-sm mb-2">{cn.rule}</p>
              <div className="space-y-1">
                {cn.examples.map((ex,i)=>(
                  <div key={i} className="text-xs text-tintasoft bg-white/70 rounded-xl px-3 py-2 flex items-center justify-between gap-2 flex-wrap">
                    <span>📝 {ex}</span>
                    <AudioButton text={ex} label="Audio" />
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      <button onClick={()=>setPhase("practice")}
        className="w-full rounded-full bg-coral text-white font-semibold py-4 shadow-coral hover:bg-coraldeep transition lift">
        Start Practice →
      </button>
    </div>
  );

  return (
    <div className="max-w-2xl mx-auto">
      {/* Header */}
      <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
        <Pill className={`${cc.bg} border ${cc.border} ${cc.text}`}>{conn.type}</Pill>
        <div className="flex gap-2">
          <Pill className="bg-nube text-tinta">{cIdx+1}/{CONNECTORS.length}</Pill>
          <Pill className="bg-ambar/10 border border-ambar/30 text-ambardeep">⭐ {score}</Pill>
        </div>
      </div>

      {/* Connector card */}
      <div className={`rounded-[28px] border p-5 mb-4 text-center ${cc.bg} ${cc.border}`}>
        <p className="font-display font-black text-4xl text-tinta mb-1">{conn.word}</p>
        <p className="text-sm text-tintasoft">{conn.rule}</p>
      </div>

      {/* Exercise */}
      <div className="rounded-2xl bg-lienzo border border-tinta/8 p-4 mb-4">
        <p className="font-mono text-[0.6rem] tracking-widest uppercase text-bruma mb-2">Complete the sentence</p>
        <p className="text-sm text-tintasoft mb-1">{conn.prompt}</p>
      </div>

      {/* Answer options */}
      {!checked && (
        <div className="grid grid-cols-2 gap-2 mb-4 connector-grid">
          {choices.map(w=>(
            <button key={w} onClick={()=>setChosen(w)}
              className={`rounded-xl border py-3 font-semibold text-sm transition lift
                ${chosen===w?"bg-tinta text-paper border-tinta":"bg-lienzo border-tinta/12 text-tinta hover:border-coral/50"}`}>
              {w}
            </button>
          ))}
        </div>
      )}

      {/* Result */}
      {checked && (
        <div className={`rounded-xl p-4 mb-3 pop text-sm border
          ${chosen.toLowerCase()===conn.blankWord.toLowerCase()
            ?"bg-menta/12 border-menta/30 text-mentadeep"
            :"bg-coral/10 border-coral/30 text-coral"}`}>
          {chosen.toLowerCase()===conn.blankWord.toLowerCase()
            ? <><b>✅ Correct!</b> "{conn.word}" is the right connector here.<br/><span className="italic text-tintasoft mt-1 block">{conn.correct}</span></>
            : <><b>❌ Answer: "{conn.blankWord}"</b><br/><span className="text-tintasoft text-xs mt-1 block">{conn.rule}</span><span className="italic text-tintasoft text-xs mt-1 block">{conn.correct}</span></>
          }
        </div>
      )}
      {checked && <div className="mb-4"><AudioButton text={conn.correct} label="Listen to complete sentence" /></div>}

      <div className="flex gap-2">
        {!checked && (
          <button onClick={checkAns} disabled={!chosen}
            className="flex-1 rounded-full bg-tinta text-paper font-semibold py-3 disabled:opacity-30 transition lift">
            Check ✓
          </button>
        )}
        {checked && (
          <button onClick={next}
            className="flex-1 rounded-full bg-coral text-white font-semibold py-3 shadow-coral hover:bg-coraldeep transition lift">
            {cIdx+1>=CONNECTORS.length ? "Finish 🎉" : "Next →"}
          </button>
        )}
      </div>
    </div>
  );
}

/* ── REFERENCE ───────────────────────────────────────────────────────────────── */
function Reference() {
  const RULES= [
    {e:"☀️",t:"Present Simple",       r:"Subject + base verb / verb-s. Use it for routines, habits, facts, and repeated actions.",c:"menta", example:"She works every day."},
    {e:"📅",t:"Past Simple",          r:"Subject + past verb. Use it for finished actions at a finished time.",c:"coral", example:"She worked yesterday."},
    {e:"⚡",t:"Present Progressive",  r:"am/is/are + verb-ing. Use it for actions happening now or around now.",c:"vino", example:"She is working now."},
    {e:"🎬",t:"Past Progressive",     r:"was/were + verb-ing. Use it for actions in progress at a past moment.",c:"ambar", example:"She was working at 8 p.m."},
    {e:"🔗",t:"Connectors / Conjunctions", r:"and, but, because, so, when, while, after, and before connect clauses and ideas.",c:"menta", example:"She was studying while he was working."},
  ];
  const MC={menta:"bg-menta/10 border-menta/30 text-mentadeep",coral:"bg-coral/10 border-coral/30 text-coral",ambar:"bg-ambar/10 border-ambar/30 text-ambardeep",vino:"bg-vino/10 border-vino/30 text-vino"};
  const DIFFERENCE = [
    ["Present Simple", "I walk to school every day.", "habit / routine now"],
    ["Past Simple", "I walked to school yesterday.", "finished action in the past"],
    ["Present Progressive", "I am walking to school now.", "action happening now"],
    ["Past Progressive", "I was walking to school when it rained.", "action in progress in the past"],
  ];
  const FORMS = [
    {label:"Present Simple", rows:[["I / You / We / They","walk"],["He / She / It","walks"]]},
    {label:"Past Simple", rows:[["All subjects","walked / went"]]},
    {label:"Present Progressive", rows:[["I","am walking"],["He / She / It","is walking"],["You / We / They","are walking"]]},
    {label:"Past Progressive", rows:[["I / He / She / It","was walking"],["You / We / They","were walking"]]},
  ];
  return (
    <div className="max-w-2xl mx-auto space-y-4">
      <Hint>Use the distinction below as the decision system: time first, then aspect. Present vs past tells when; simple vs progressive tells whether the action is a complete/general action or an action in progress.</Hint>
      <div className="space-y-2">
        {RULES.map((r,i)=>(
          <div key={i} className={`rounded-2xl border p-3 ${MC[r.c]}`}>
            <div className="flex items-center justify-between gap-3 flex-wrap">
              <div>
                <p className="font-semibold text-sm">{r.e} {r.t}</p>
                <p className="text-xs mt-0.5 opacity-80">{r.r}</p>
                <p className="text-xs mt-1 italic text-tintasoft">{r.example}</p>
              </div>
              <AudioButton text={r.example} label="Listen" />
            </div>
          </div>
        ))}
      </div>

      <div className="rounded-[22px] border border-tinta/8 overflow-hidden">
        <div className="bg-tinta text-paper px-4 py-2.5">
          <p className="font-mono text-[0.62rem] tracking-widest uppercase">Four-way tense difference</p>
        </div>
        <div className="divide-y divide-tinta/5">
          <div className="grid grid-cols-3 px-4 py-2 bg-nube/50">
            {["Category","Example","Meaning"].map(h=>(
              <span key={h} className="font-mono text-[0.55rem] tracking-wider uppercase text-bruma">{h}</span>
            ))}
          </div>
          {DIFFERENCE.map(([cat,ex,meaning])=>(
            <div key={cat} className="grid grid-cols-3 gap-2 px-4 py-3 bg-lienzo items-center">
              <span className="font-semibold text-tinta text-sm">{cat}</span>
              <span className="text-coral font-semibold text-sm">{ex}</span>
              <span className="text-tintasoft text-xs">{meaning}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3 connector-grid">
        {FORMS.map(g=>(
          <div key={g.label} className="rounded-2xl border border-tinta/8 bg-lienzo p-4">
            <p className="font-mono text-[0.58rem] tracking-widest uppercase text-bruma mb-3">{g.label}</p>
            {g.rows.map(([p,v])=>(
              <div key={p} className="flex items-center gap-2 py-1 border-b border-tinta/5 last:border-0">
                <span className="font-semibold text-xs w-28 text-bruma">{p}</span>
                <span className="text-tinta text-xs font-semibold">{v}</span>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── RESULTS ─────────────────────────────────────────────────────────────────── */
function Results({score, label, onReplay}) {
  const rank = score>=150?"🏆 Grammar Master":score>=90?"⭐ Strong Learner":score>=50?"💪 Keep Practicing":"🧠 More Reps Needed";
  return (
    <div className="max-w-sm mx-auto text-center pop py-8">
      <div className="text-6xl mb-4">{score>=100?"🎉":"📚"}</div>
      <h2 className="font-display font-black text-4xl text-tinta mb-2">Done!</h2>
      <p className="text-tintasoft mb-5">{label} · <b className="text-coral">Score: {score}</b></p>
      <div className={`rounded-3xl p-5 mb-6 border ${score>=90?"bg-menta/10 border-menta/30":"bg-ambar/10 border-ambar/30"}`}>
        <p className={`font-display text-2xl font-bold ${score>=90?"text-mentadeep":"text-ambardeep"}`}>{rank}</p>
      </div>
      <button onClick={onReplay}
        className="w-full rounded-full bg-coral text-white font-semibold py-4 shadow-coral hover:bg-coraldeep transition lift mb-3">
        Play Again
      </button>
      <a href={WA_LINK} target="_blank" rel="noopener noreferrer"
        className="w-full rounded-full flex items-center justify-center gap-2 font-semibold py-3.5 text-white text-sm lift"
        style={{background:"#25D366"}}>
        <svg width="18" height="18" viewBox="0 0 32 32" fill="currentColor"><path d="M16.04 4C9.96 4 5 8.95 5 15.02c0 2.4.77 4.62 2.08 6.43L5 28l6.74-2.03a11 11 0 0 0 4.3.87h.01C22.12 26.84 27 21.9 27 15.83 27 9.76 22.04 4 16.04 4Zm0 20.4h-.01a9.1 9.1 0 0 1-4.64-1.27l-.33-.2-3.86 1.16 1.18-3.76-.22-.35a9.06 9.06 0 0 1-1.38-4.81c0-5.02 4.1-9.1 9.13-9.1 2.44 0 4.73.95 6.45 2.67a9.06 9.06 0 0 1 2.68 6.44c0 5.02-4.1 9.1-9.13 9.1Zm5.01-6.81c-.27-.14-1.62-.8-1.87-.89-.25-.09-.43-.14-.62.14-.18.27-.71.89-.87 1.07-.16.18-.32.2-.59.07-.27-.14-1.16-.43-2.2-1.36-.81-.72-1.36-1.62-1.52-1.89-.16-.27-.02-.42.12-.55.12-.12.27-.32.41-.48.14-.16.18-.27.27-.46.09-.18.05-.34-.02-.48-.07-.14-.62-1.49-.85-2.04-.22-.53-.45-.46-.62-.47l-.53-.01c-.18 0-.48.07-.73.34-.25.27-.96.94-.96 2.29s.98 2.66 1.12 2.84c.14.18 1.93 2.95 4.68 4.13.65.28 1.16.45 1.56.58.66.21 1.25.18 1.72.11.52-.08 1.62-.66 1.85-1.3.23-.64.23-1.18.16-1.3-.07-.12-.25-.18-.52-.32Z"/></svg>
        Share your result with Prof.
      </a>
    </div>
  );
}

/* ── APP ROOT ─────────────────────────────────────────────────────────────────── */
const MODES = [
  {id:"intro",      label:"🏠 Start"},
  {id:"reference",  label:"📖 Reference"},
  {id:"sentences",  label:"✍️ Sentences"},
  {id:"connectors", label:"🔗 Connectors"},
];

function App() {
  const [mode,    setMode]   = useState("intro");
  const [filter,  setFilter] = useState("all");
  const [result,  setResult] = useState(null);
  const [gameKey, setGameKey]= useState(0);

  const filtered = useMemo(()=>
    filter==="all" ? SENTENCES : SENTENCES.filter(s=>s.tense===filter), [filter]);

  const go = id => { setMode(id); setResult(null); setGameKey(k=>k+1); };

  return (
    <div className="game-shell font-sans text-tinta min-h-screen pb-24">
      <div className="fixed inset-0 -z-10" style={{
        background:"radial-gradient(60% 50% at 10% 0%,rgba(255,90,60,.07),transparent 60%),radial-gradient(55% 55% at 100% 100%,rgba(21,183,158,.09),transparent 60%),#FCF8F3"
      }}/>
      <div className="game-container max-w-2xl mx-auto px-4 py-6 sm:py-10">

        {/* HEADER */}
        <header className="text-center mb-6">
          <p className="font-mono text-[0.68rem] tracking-[0.26em] uppercase text-coral mb-2">
            Present/Past Simple & Progressive · Connectors · ProfGermandario
          </p>
          <h1 className="font-display font-black text-4xl sm:text-5xl text-tinta leading-[0.95]">
            Complete<br/>
            <span className="italic font-medium text-coral">Sentences.</span>
          </h1>
          <div className="my-4"><WaveBars/></div>
          <p className="text-tintasoft text-sm sm:text-base max-w-sm mx-auto leading-relaxed">
            Create sentences in Present Simple, Past Simple, Present Progressive, and Past Progressive. Then connect ideas with conjunctions.
          </p>
        </header>

        {/* NAV */}
        <nav className="flex gap-2 overflow-x-auto hide-scrollbar mb-6 pb-1" aria-label="Game modes">
          {MODES.map(m=>(
            <button key={m.id} onClick={()=>go(m.id)}
              className={`shrink-0 rounded-full px-4 py-2.5 text-sm font-semibold transition
                ${mode===m.id?"bg-tinta text-paper":"bg-nube text-tintasoft hover:text-coral"}`}>
              {m.label}
            </button>
          ))}
        </nav>

        {/* INTRO */}
        {mode==="intro" && (
          <div className="space-y-4 pop">
            <Hint>Two stages. First identify the tense category clearly; then build sentences and connect clauses with connectors and conjunctions.</Hint>

            {/* Stage 1 card */}
            <div className="rounded-[28px] border border-tinta/8 bg-lienzo p-5 shadow-soft">
              <div className="text-3xl mb-3">✍️</div>
              <h2 className="font-display font-bold text-2xl text-tinta mb-2">Stage 1 — Build Sentences</h2>
              <p className="text-tintasoft text-sm leading-relaxed mb-4">
                Scrambled words appear. Tap them in the right order. Covers Present Simple, Past Simple, Present Progressive, and Past Progressive — including connector-based sentences with and, but, because, so, when, while, before, and after.
              </p>
              {/* Tense filter */}
              <p className="font-mono text-[0.6rem] tracking-widest uppercase text-bruma mb-2">Filter by tense:</p>
              <div className="flex flex-wrap gap-2 mb-4">
                {TENSE_FILTERS.map(f=>{
                  const m2 = f==="all" ? null : TENSE_META[f];
                  return (
                    <button key={f} onClick={()=>setFilter(f)}
                      className={`filter-chip rounded-full px-3 py-1.5 text-xs font-semibold border transition
                        ${filter===f
                          ? (m2?`${m2.bg} ${m2.border} ${m2.text}`:"bg-tinta/8 border-tinta/20 text-tinta")
                          : "bg-nube border-tinta/10 text-bruma hover:text-coral"}`}>
                      {f==="all"?"⭐ All":m2.emoji+" "+m2.label}
                    </button>
                  );
                })}
              </div>
              <p className="font-mono text-xs text-bruma mb-4">{filtered.length} sentences ready</p>
              <button onClick={()=>go("sentences")}
                className="w-full rounded-full bg-coral text-white font-semibold py-3.5 shadow-coral hover:bg-coraldeep transition lift">
                Start Stage 1 →
              </button>
            </div>

            {/* Stage 2 card */}
            <div className="rounded-[28px] border border-tinta/8 bg-lienzo p-5 shadow-soft">
              <div className="text-3xl mb-3">🔗</div>
              <h2 className="font-display font-bold text-2xl text-tinta mb-2">Stage 2 — Connectors</h2>
              <p className="text-tintasoft text-sm leading-relaxed mb-4">
                Once the tense structure is solid, link clauses. 12 essential connectors/conjunctions across 5 categories: Additive, Contrast, Cause, Result, and Time.
              </p>
              <div className="flex flex-wrap gap-1.5 mb-4">
                {["and","but","because","so","when","after","before","however","although","also","too","therefore"].map(w=>(
                  <span key={w} className="rounded-full px-2.5 py-1 bg-nube border border-tinta/8 text-tintasoft text-xs font-mono">{w}</span>
                ))}
              </div>
              <button onClick={()=>go("connectors")}
                className="w-full rounded-full bg-menta text-white font-semibold py-3.5 shadow-menta hover:bg-mentadeep transition lift">
                Start Stage 2 →
              </button>
            </div>

            <button onClick={()=>go("reference")}
              className="w-full rounded-2xl border border-tinta/10 bg-nube/60 text-tintasoft text-sm font-semibold py-3 hover:border-coral hover:text-coral transition">
              📖 Open Quick Reference Table
            </button>
          </div>
        )}

        {mode==="reference"  && <Reference/>}
        {mode==="sentences"  && (
          <SentenceBuilder key={gameKey} sentences={filtered}
            onComplete={score=>{ setResult({score,label:"Build Sentences"}); setMode("result"); }}/>
        )}
        {mode==="connectors" && (
          <ConnectorTrainer key={gameKey}
            onComplete={score=>{ setResult({score,label:"Connectors"}); setMode("result"); }}/>
        )}
        {mode==="result" && result && (
          <Results score={result.score} label={result.label} onReplay={()=>go("intro")}/>
        )}

        <SocialFooter/>
      </div>
      <WhatsAppBtn/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>


</body></html>
</body></html>
