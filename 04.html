      ['вЪљ','рЯПА','рЯПИ','вЪЊ','рЯОЊ','рЯПР','рЯПЙ','рЯО±','рЯПУ','рЯПЄ','рЯ•Е','рЯПЖ','рЯ•З','рЯ•И','рЯ•Й','рЯПЕ','рЯОЦпЄП','рЯПµпЄП','рЯОЧпЄП','рЯОЂ','рЯОЯпЄП','рЯ•П','рЯПП','рЯ•Н','рЯЫє'],
      ['рЯФ®','вЪТпЄП','рЯЫ†пЄП','рЯФІ','рЯФ©','вЪЩпЄП','рЯІ∞','рЯФЧ','вЫУпЄП','рЯІ≤','рЯ™Э','рЯІ±','рЯ™Ъ','рЯ™Ы','рЯ™Ь','рЯІѓ','рЯ™£','рЯІє','рЯІЇ','рЯЧЭпЄП','рЯ™У','вЫПпЄП','рЯФ±','рЯПє','рЯЫЮ'],
      ['рЯММ','рЯМ†','вШДпЄП','рЯ™Р','рЯМН','рЯМО','рЯМП','рЯМХ','рЯМЦ','рЯМЧ','рЯМШ','рЯМС','рЯМТ','рЯМУ','рЯМФ','рЯМЫ','рЯМЬ','рЯМЭ','вЬ®','в≠Р','рЯМЯ','рЯТЂ','рЯФЃ','рЯІњ','рЯЫ∞пЄП'],
      ['вЭ§пЄП','рЯІ°','рЯТЫ','рЯТЪ','рЯТЩ','рЯТЬ','рЯЦ§','рЯ§Н','рЯ§О','рЯТФ','вЭ£пЄП','рЯТХ','рЯТЦ','рЯТЧ','рЯТШ','рЯТЭ','рЯТЮ','рЯТЯ','рЯЂґ','рЯТМ','рЯТЛ','рЯМє','рЯШН','рЯ•∞','рЯТР']
    ];

    // вФАвФА 12 niveles en 3 bloques de 4 вФАвФА

      {len:3, show:1200}, {len:4, show:1200}, {len:5, show:1100}, {len:6, show:1100},   // Principiante
      {len:6, show:900},  {len:7, show:900},  {len:8, show:850},  {len:9, show:800},    // Intermedio
      {len:9, show:700},  {len:10,show:650},  {len:11,show:600},  {len:12,show:550},    // Experto
    ];
    const TIERS = [
      {name:'Principiante', range:'Niveles 1вАУ4',  color:'coral', from:0, to:4},
      {name:'Intermedio',   range:'Niveles 5вАУ8',  color:'menta', from:4, to:8},
      {name:'Experto',      range:'Niveles 9вАУ12', color:'ambar', from:8, to:12},
    ];
    const TC = {
      coral: {dot:'bg-coral',  panel:'bg-coral/5',  ring:'border-coral/40',  text:'text-coraldeep'},
      menta: {dot:'bg-menta',  panel:'bg-menta/5',  ring:'border-menta/40',  text:'text-mentadeep'},
      ambar: {dot:'bg-ambar',  panel:'bg-ambar/10', ring:'border-ambar/50',  text:'text-[#A9760A]'},
    };
    const tierOf = (lvl) => lvl<=4?0 : lvl<=8?1 : 2;
    const roundUp4 = (x)=>Math.ceil(x/4)*4;
    const gridFor = (len)=>Math.min(20, Math.max(12, roundUp4(len+4)));

    const App = () => {
      const [phase, setPhase] = useState('menu');     // menu | start | showing | input | result
      const [level, setLevel] = useState(1);
      const [sequence, setSequence] = useState([]);
      const [available, setAvailable] = useState([]);
      const [userInput, setUserInput] = useState([]);
      const [showingIndex, setShowingIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [completed, setCompleted] = useState(new Set());
      const [correct, setCorrect] = useState(false);
      const [showHint, setShowHint] = useState(false);

      const generate = (lvl) => {
        const len = LEVELS[lvl-1].len, gridN = gridFor(len);
        const all = emojiPools.flat();
        const seq = [];
        while(seq.length < len){ const e = all[Math.floor(Math.random()*all.length)]; if(!seq.includes(e)) seq.push(e); }
        const avail = [...seq];
        while(avail.length < gridN){ const e = all[Math.floor(Math.random()*all.length)]; if(!avail.includes(e)) avail.push(e); }
        for(let i=avail.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [avail[i],avail[j]]=[avail[j],avail[i]]; }
        return {seq, avail};
      };

      const pickLevel = (lvl) => { setLevel(lvl); setPhase('start'); };
      const beginLevel = () => {
        const {seq, avail} = generate(level);
        setSequence(seq); setAvailable(avail); setUserInput([]); setShowingIndex(0); setShowHint(false); setPhase('showing');
      };

      useEffect(() => {
        if(phase!=='showing') return;
        if(showingIndex < sequence.length){
          const t = setTimeout(()=>setShowingIndex(i=>i+1), LEVELS[level-1].show);
          return ()=>clearTimeout(t);
        } else {
          const t = setTimeout(()=>setPhase('input'), 700);
          return ()=>clearTimeout(t);
        }
      }, [phase, showingIndex, sequence.length, level]);

      const handleEmoji = (emoji) => {
        if(phase!=='input' || userInput.includes(emoji)) return;
        const next = [...userInput, emoji];
        setUserInput(next);
        if(next.length === sequence.length){
          const ok = next.every((e,i)=>e===sequence[i]);
          setCorrect(ok);
          if(ok){ setScore(s=>s + level*10); setCompleted(prev=>new Set([...prev, level])); }
          setTimeout(()=>setPhase('result'), 350);
        }
      };
      const clearInput = () => setUserInput([]);
      const hint = () => { setShowHint(true); setTimeout(()=>setShowHint(false), 1800); };
      const nextLevel = () => { if(level<12) pickLevel(level+1); else setPhase('menu'); };
      const resetProgress = () => { setScore(0); setCompleted(new Set()); setPhase('menu'); };

      // вФАвФА UI helpers вФАвФА
      const Header = () => (
        <header className="text-center pt-7 pb-1">
          <span className="font-mono text-[0.68rem] tracking-[0.26em] uppercase text-coral inline-flex items-center gap-2.5">

          <h1 className="font-display font-black text-4xl sm:text-5xl mt-3 leading-none"
              style={{background:'linear-gradient(120deg,#FF5A3C 35%,#7C5CFF)', WebkitBackgroundClip:'text', backgroundClip:'text', WebkitTextFillColor:'transparent'}}>
            Memoria Visual
          </h1>
          <div className="wave my-3.5"><Wave/></div>
          <p className="text-tintasoft max-w-md mx-auto text-[0.98rem]">Memoriza la secuencia y reprod√Їcela. Tu memoria es un m√Їsculo: entr√©nalo.</p>
        </header>
      );

      const StatBar = () => (
        <div className="flex bg-white border border-tinta/10 rounded-2xl overflow-hidden shadow-[0_8px_24px_rgba(26,23,48,0.06)] mb-5">
          <div className="flex-1 py-3 text-center border-r border-tinta/5">
            <div className="font-display font-black text-2xl text-coral leading-none">{score}</div>
            <div className="font-mono text-[0.6rem] tracking-widest uppercase text-bruma mt-1.5">Puntos</div>
          </div>
          <div className="flex-1 py-3 text-center">
            <div className="font-display font-black text-2xl text-mentadeep leading-none">{completed.size}/12</div>
            <div className="font-mono text-[0.6rem] tracking-widest uppercase text-bruma mt-1.5">Completados</div>
          </div>
        </div>
      );

      const tierBadge = (lvl) => {
        const t = TIERS[tierOf(lvl)];
        return <span className={`inline-flex items-center gap-2 font-mono text-[0.62rem] tracking-[0.14em] uppercase ${TC[t.color].text}`}>
          <span className={`w-2 h-2 rounded-full ${TC[t.color].dot}`}></span>{t.name}
        </span>;
      };

      // вФАвФА PHASES вФАвФА
      let body = null;

      if(phase==='menu'){
        body = (
          <div>
            <p className="text-center text-sm text-bruma mb-5">
              рЯСА Observa la secuencia y <span className="text-coral font-semibold">reprod√Їcela en orden</span>. Cada 4 niveles sube la dificultad.
            </p>
            <StatBar/>
            {TIERS.map((t,ti)=>(
              <div key={ti} className={`${TC[t.color].panel} rounded-2xl p-4 mb-5`}>

                  <span className="font-mono text-[0.6rem] tracking-widest uppercase text-bruma">{t.range}</span>
                </div>
                <div className="grid grid-cols-4 gap-2.5">
                  {Array.from({length:4}).map((_,k)=>{
                    const lvl = t.from + k + 1;
                    const done = completed.has(lvl);
                    return (
                      <button key={lvl} onClick={()=>pickLevel(lvl)}
                        style={{touchAction:'manipulation'}}

              Velocidad: {cfg.show<=650?'r√°pida':cfg.show<=900?'media':'tranquila'}

            <div className="flex flex-wrap justify-center items-center gap-2.5 sm:gap-3">

                  className={`rounded-2xl flex items-center justify-center transition-all duration-300 w-[clamp(54px,16vw,84px)] h-[clamp(54px,16vw,84px)] text-[clamp(1.8rem,8vw,3rem)]

                      : idx===showingIndex ? 'bg-ambar scale-110 pulse-grow'
                      : 'bg-nube opacity-50'}`}>
                  {idx<=showingIndex ? emoji : 'вЭУ'}
                </div>
              ))}
            </div>
          </div>
        );
      }

      if(phase==='input'){
        const cols = available.length>12 ? 'grid-cols-4 sm:grid-cols-5' : 'grid-cols-4';
        body = (
          <div className="text-center">
            <h2 className="font-display font-bold text-xl sm:text-2xl mb-1">¬°Reprod√Їcela!</h2>
            <p className="font-mono text-[0.65rem] tracking-widest uppercase text-bruma mb-5">{userInput.length} de {sequence.length}</p>

            <div className="flex flex-wrap justify-center items-center gap-2 mb-4">
              {sequence.map((_,idx)=>(
                <div key={idx}
                  className="rounded-xl border-2 border-dashed border-tinta/15 bg-nube/40 flex items-center justify-center w-[clamp(46px,13vw,68px)] h-[clamp(46px,13vw,68px)] text-[clamp(1.4rem,6vw,2.2rem)]">
                  {userInput[idx] || ''}
                </div>
              ))}
            </div>

            <div className="flex justify-center gap-2 mb-6">
              <button onClick={hint} className="bg-ambar/20 text-[#A9760A] font-semibold rounded-full px-4 py-2 text-sm hover:bg-ambar/30 transition">рЯТ° Pista</button>
              <button onClick={clearInput} className="bg-nube text-tinta font-semibold rounded-full px-4 py-2 text-sm hover:bg-[#E9E2D6] transition">рЯЧСпЄП Limpiar</button>
            </div>

            <div className={`grid ${cols} gap-2.5 max-w-md mx-auto`}>
              {available.map((emoji,idx)=>{
                const used = userInput.includes(emoji);
                const hl = showHint && sequence.includes(emoji);
                return (
                  <button key={idx} onClick={()=>handleEmoji(emoji)} disabled={used}
                    style={{touchAction:'manipulation'}}
                    className={`aspect-square rounded-2xl flex items-center justify-center text-[clamp(1.5rem,7vw,2.2rem)] transition active:scale-95
                      ${used ? 'opacity-25 bg-nube' : hl ? 'blink-hint bg-ambar/40' : 'bg-nube hover:-translate-y-0.5 hover:bg-[#E9E2D6]'}`}>
                    {emoji}
                  </button>
                );
              })}
            </div>
          </div>
        );
      }

      if(phase==='result'){
        body = (
          <div className="text-center">
            <h2 className="font-display font-black text-3xl mb-1" style={{color: correct?'#0E8C79':'#C8453F'}}>
              {correct ? '¬°Perfecto! рЯОЙ' : 'CasiвА¶ рЯТ™'}
            </h2>
            <p className="text-tintasoft mb-6">{correct ? `+${level*10} puntos` : 'Compara y vuelve a intentarlo.'}</p>

            <p className="font-mono text-[0.62rem] tracking-widest uppercase text-bruma mb-2">Secuencia correcta</p>
            <div className="flex flex-wrap justify-center gap-2 mb-5">
              {sequence.map((e,idx)=>(
                <div key={idx} className="rounded-xl bg-menta/15 flex items-center justify-center w-[clamp(42px,11vw,58px)] h-[clamp(42px,11vw,58px)] text-[clamp(1.3rem,5vw,2rem)]">{e}</div>
              ))}
            </div>
            <p className="font-mono text-[0.62rem] tracking-widest uppercase text-bruma mb-2">Tu respuesta</p>
            <div className="flex flex-wrap justify-center gap-2 mb-7">
              {userInput.map((e,idx)=>(
                <div key={idx} className={`rounded-xl flex items-center justify-center w-[clamp(42px,11vw,58px)] h-[clamp(42px,11vw,58px)] text-[clamp(1.3rem,5vw,2rem)] ${e===sequence[idx]?'bg-menta/15':'bg-[#F26D6D]/20'}`}>{e}</div>
              ))}
            </div>

            <div className="flex flex-wrap justify-center gap-2.5">
              {correct && level<12 && (
                <button onClick={nextLevel} className="bg-coral text-white font-semibold rounded-full px-6 py-3 hover:bg-coraldeep transition">Siguiente nivel вЦґ</button>
              )}
              <button onClick={beginLevel} className="border-[1.5px] border-tinta/15 text-tinta font-semibold rounded-full px-6 py-3 hover:border-tinta transition">Reintentar</button>
              <button onClick={()=>setPhase('menu')} className="border-[1.5px] border-tinta/15 text-tinta font-semibold rounded-full px-6 py-3 hover:border-tinta transition">Mapa de niveles</button>
            </div>

            {correct && level===12 && (
              <div className="mt-6 bg-ambar/15 border border-ambar/40 rounded-2xl p-4">
                <h3 className="font-display font-bold text-lg text-[#A9760A] mb-1">рЯПЖ ¬°Completaste los 12 niveles!</h3>
                <p className="text-tintasoft text-sm">Tu memoria visual es excepcional. Puntuaci√≥n final: <b>{score} puntos</b>.</p>
              </div>
            )}
          </div>
        );
      }

      return (
        <div className="min-h-screen relative pb-24">
          <div className="fixed inset-0 -z-10" style={{background:'radial-gradient(60% 45% at 12% 0%, rgba(255,90,60,0.06), transparent 60%), radial-gradient(55% 55% at 100% 100%, rgba(124,92,255,0.07), transparent 60%)'}} />
          <div className="w-full max-w-2xl mx-auto px-4">
            <Header/>
            <div className="bg-white rounded-[20px] border border-tinta/5 shadow-[0_10px_30px_rgba(26,23,48,0.08)] p-4 sm:p-7 mt-3">
              {body}
            </div>
            <p className="text-center mt-5 font-mono text-[0.62rem] tracking-[0.1em] uppercase text-bruma">
              ProfGermandario ¬Ј Entrena tu mente
            </p>
          </div>
        </div>
      );
    };

    const Wave = () => (
      <React.Fragment>
        {Array.from({length:22}).map((_,i)=>(
          <i key={i} style={{ height:(8+Math.abs(Math.sin(i*0.6))*18)+'px', animationDelay:(i*0.07)+'s', animationDuration:(1.1+(i%5)*0.12)+'s' }} />
        ))}
      </React.Fragment>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
