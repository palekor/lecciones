.wave{

  gap:4px;
  height:28px;
  justify-content:center;
  margin:.875rem 0;
}
.wave i{

  width:4px;
  border-radius:4px;
  transform-origin:bottom;
  background:linear-gradient(to top,var(--menta),var(--coral) 60%,var(--ambar));
  animation:vox 1.3s ease-in-out infinite;
}
@keyframes vox{
  0%,100%{transform:scaleY(.25);}
  50%{transform:scaleY(1);}
}
@keyframes blink{
  0%,50%{opacity:1;}
  25%,75%{opacity:.3;}
}
.blink-hint{ animation:blink .6s ease-in-out 3; }
@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.12);}
  100%{transform:scale(1);}
}
.pulse-grow{ animation:pulse .85s ease-in-out infinite; }
.card{

    ["🔨","⚒️","🛠️","🔧","🔩","⚙️","🧰","🔗","⛓️","🧲","🪝","🧱","🪚","🪛","🪜","🧯","🪣","🧹","🧺","🗝️","🪓","⛏️","🔱","🏹","🛞"],
    ["🌌","🌠","☄️","🪐","🌍","🌎","🌏","🌕","🌖","🌗","🌘","🌑","🌒","🌓","🌔","🌛","🌜","🌝","✨","⭐","🌟","💫","🔮","🧿","🛰️"],
    ["❤️","🧡","💛","💚","💙","💜","🖤","🤍","🤎","💔","❣️","💕","💖","💗","💘","💝","💞","💟","🫶","💌","💋","🌹","😍","🥰","💐"]
  ];
  const allEmojis = emojiPools.flat();

  const LEVELS = [
    {len:3, show:1200}, {len:4, show:1200}, {len:5, show:1100}, {len:6, show:1100},
    {len:6, show:900},  {len:7, show:900},  {len:8, show:850},  {len:9, show:800},
    {len:9, show:700},  {len:10,show:650},  {len:11,show:600},  {len:12,show:550}
  ];
  const TIERS = [
    {name:"Principiante", range:"Niveles 1–4",  color:"coral", from:0, to:4},
    {name:"Intermedio",   range:"Niveles 5–8",  color:"menta", from:4, to:8},
    {name:"Experto",      range:"Niveles 9–12", color:"ambar", from:8, to:12}
  ];

  let state = {
    phase:"menu",
    level:1,
    sequence:[],
    available:[],
    userInput:[],
    showingIndex:0,
    score:0,
    completed:new Set(),
    correct:false,
    showHint:false
  };

  let timer = null;
  let hintTimer = null;

  function esc(value){
    return String(value)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#039;");
  }

  function setState(patch){
    state = Object.assign({}, state, patch);
    render();
  }

  function clearTimers(){
    if(timer){ clearTimeout(timer); timer = null; }
    if(hintTimer){ clearTimeout(hintTimer); hintTimer = null; }
  }

  function tierOf(lvl){ return lvl <= 4 ? 0 : lvl <= 8 ? 1 : 2; }
  function roundUp4(x){ return Math.ceil(x/4)*4; }
  function gridFor(len){ return Math.min(20, Math.max(12, roundUp4(len+4))); }

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      const tmp = arr[i];
      arr[i] = arr[j];
      arr[j] = tmp;
    }
    return arr;
  }

  function generate(lvl){
    const len = LEVELS[lvl-1].len;
    const gridN = gridFor(len);
    const seq = [];
    while(seq.length < len){
      const e = allEmojis[Math.floor(Math.random()*allEmojis.length)];
      if(!seq.includes(e)) seq.push(e);
    }
    const avail = seq.slice();
    while(avail.length < gridN){
      const e = allEmojis[Math.floor(Math.random()*allEmojis.length)];
      if(!avail.includes(e)) avail.push(e);
    }
    return {seq:seq, avail:shuffle(avail)};
  }

  function pickLevel(lvl){
    clearTimers();
    setState({ level:lvl, phase:"start", showHint:false });
  }

  function beginLevel(){
    clearTimers();
    const generated = generate(state.level);
    setState({
      sequence:generated.seq,
      available:generated.avail,
      userInput:[],
      showingIndex:0,
      showHint:false,
      correct:false,
      phase:"showing"
    });
  }

  function handleEmoji(emoji){
    if(state.phase !== "input" || state.userInput.includes(emoji)) return;
    const next = state.userInput.concat(emoji);
    const patch = { userInput:next };
    if(next.length === state.sequence.length){
      const ok = next.every((e,i)=>e === state.sequence[i]);
      patch.correct = ok;
      if(ok){
        patch.score = state.score + state.level * 10;
        const completed = new Set(state.completed);
        completed.add(state.level);
        patch.completed = completed;
      }
      clearTimers();
      timer = setTimeout(()=>setState({phase:"result"}), 350);
    }
    setState(patch);
  }

  function clearInput(){
    if(state.phase !== "input") return;
    setState({ userInput:[] });
  }

  function showHint(){
    if(state.phase !== "input") return;
    if(hintTimer){ clearTimeout(hintTimer); hintTimer = null; }
    setState({ showHint:true });
    hintTimer = setTimeout(()=>setState({showHint:false}), 1800);
  }

  function nextLevel(){
    if(state.level < 12) pickLevel(state.level + 1);
    else setState({ phase:"menu" });
  }

  function resetProgress(){
    clearTimers();
    setState({ score:0, completed:new Set(), phase:"menu" });
  }

  function waveHtml(){
    return Array.from({length:22}).map((_,i)=>{
      const h = 8 + Math.abs(Math.sin(i*.6))*18;
      const delay = i*.07;
      const duration = 1.1 + (i%5)*.12;
      return `<i style="height:${h.toFixed(2)}px;animation-delay:${delay.toFixed(2)}s;animation-duration:${duration.toFixed(2)}s"></i>`;
    }).join("");
  }

  function headerHtml(){
    return `
      <header class="header">
        <span class="eyebrow">Lección 4 · Juego mental</span>
        <h1>Memoria Visual</h1>
        <div class="wave" aria-hidden="true">${waveHtml()}</div>
        <p>Memoriza la secuencia y reprodúcela. Tu memoria es un músculo: entrénalo.</p>
      </header>`;
  }

  function statBarHtml(){
    return `
      <div class="statbar" aria-label="Progreso">
        <div class="stat">
          <div class="stat-value coral">${state.score}</div>
          <div class="stat-label">Puntos</div>
        </div>
        <div class="stat">
          <div class="stat-value menta">${state.completed.size}/12</div>
          <div class="stat-label">Completados</div>
        </div>
      </div>`;
  }

  function tierBadgeHtml(lvl){
    const t = TIERS[tierOf(lvl)];
    return `<span class="badge ${t.color}"><span class="dot ${t.color}"></span>${esc(t.name)}</span>`;
  }

  function menuHtml(){
    const tiers = TIERS.map((t)=>{
      const levels = Array.from({length:4}).map((_,k)=>{
        const lvl = t.from + k + 1;
        const done = state.completed.has(lvl);
        return `
          <button type="button" class="level-btn ${done ? "done" : ""}" data-action="pick-level" data-level="${lvl}" aria-label="Nivel ${lvl}, ${LEVELS[lvl-1].len} emojis">
            <span class="level-number">${lvl}</span>
            <span class="level-meta">${LEVELS[lvl-1].len} emojis</span>
            ${done ? `<span class="check" aria-hidden="true">✓</span>` : ""}
          </button>`;
      }).join("");
      return `
        <section class="tier ${t.color}">
          <div class="tier-head">
            <span class="tier-title ${t.color}"><span class="dot ${t.color}"></span>${esc(t.name)}</span>
            <span class="tier-range">${esc(t.range)}</span>
          </div>
          <div class="level-grid">${levels}</div>
        </section>`;
    }).join("");

    return `
      <p class="intro">👀 Observa la secuencia y <b>reprodúcela en orden</b>. Cada 4 niveles sube la dificultad.</p>
      ${statBarHtml()}
      ${tiers}
      ${state.completed.size > 0 ? `<div class="center"><button type="button" class="reset" data-action="reset">↺ reiniciar progreso</button></div>` : ""}`;
  }

  function startHtml(){
    const cfg = LEVELS[state.level-1];
    const velocidad = cfg.show <= 650 ? "rápida" : cfg.show <= 900 ? "media" : "tranquila";
    return `
      <section class="start-card">
        <div>${tierBadgeHtml(state.level)}</div>
        <div class="start-title">Nivel ${state.level}</div>
        <p>Memoriza una secuencia de <b>${cfg.len} emojis</b>.</p>
        <div class="speed">Velocidad: ${velocidad}</div>
        <div class="actions">
          <button type="button" class="btn btn-primary" data-action="begin">Comenzar ▶</button>
          <button type="button" class="btn btn-light" data-action="menu">Volver al mapa</button>
        </div>
      </section>`;
  }

  function showingHtml(){
    const cards = state.sequence.map((emoji,idx)=>{
      let cls = "";
      let text = "❓";
      if(idx < state.showingIndex){ cls = "seen"; text = emoji; }
      else if(idx === state.showingIndex){ cls = "current pulse-grow"; text = emoji; }
      return `<div class="seq-card ${cls}">${esc(text)}</div>`;
    }).join("");
    return `
      <section class="center" aria-live="polite">
        <h2 class="phase-title">¡Memoriza la secuencia!</h2>
        <p class="phase-meta">${Math.min(state.showingIndex + 1, state.sequence.length)} de ${state.sequence.length}</p>
        <div class="sequence-row">${cards}</div>
      </section>`;
  }

  function inputHtml(){
    const slots = state.sequence.map((_,idx)=>{
      return `<div class="input-slot">${state.userInput[idx] ? esc(state.userInput[idx]) : ""}</div>`;
    }).join("");

    const cols = state.available.length > 12 ? "cols-5" : "cols-4";
    const buttons = state.available.map((emoji)=>{
      const used = state.userInput.includes(emoji);
      const hl = state.showHint && state.sequence.includes(emoji);
      return `
        <button type="button" class="emoji-btn ${used ? "used" : ""} ${hl ? "hint blink-hint" : ""}" data-action="emoji" data-emoji="${esc(emoji)}" ${used ? "disabled" : ""} aria-label="Elegir ${esc(emoji)}">
          ${esc(emoji)}
        </button>`;
    }).join("");

    return `
      <section class="center">
        <h2 class="phase-title">¡Reprodúcela!</h2>
        <p class="phase-meta">${state.userInput.length} de ${state.sequence.length}</p>
        <div class="answer-row">${slots}</div>
        <div class="input-actions">
          <button type="button" class="btn btn-warn" data-action="hint">💡 Pista</button>
          <button type="button" class="btn btn-muted" data-action="clear">🗑️ Limpiar</button>
        </div>
        <div class="emoji-grid ${cols}">${buttons}</div>
      </section>`;
  }

  function resultHtml(){
    const correctCards = state.sequence.map((e)=>`<div class="result-card ok">${esc(e)}</div>`).join("");
    const answerCards = state.userInput.map((e,idx)=>{
      const ok = e === state.sequence[idx];
      return `<div class="result-card ${ok ? "ok" : "fail"}">${esc(e)}</div>`;
    }).join("");

    return `
      <section class="center">
        <h2 class="result-title ${state.correct ? "ok" : "fail"}">${state.correct ? "¡Perfecto! 🎉" : "Casi… 💪"}</h2>
        <p class="result-msg">${state.correct ? "+" + (state.level * 10) + " puntos" : "Compara y vuelve a intentarlo."}</p>

        <p class="result-label">Secuencia correcta</p>
        <div class="answer-row">${correctCards}</div>

        <p class="result-label">Tu respuesta</p>
        <div class="answer-row">${answerCards}</div>

        <div class="actions">
          ${state.correct && state.level < 12 ? `<button type="button" class="btn btn-primary" data-action="next">Siguiente nivel ▶</button>` : ""}
          <button type="button" class="btn btn-outline" data-action="begin">Reintentar</button>
          <button type="button" class="btn btn-outline" data-action="menu">Mapa de niveles</button>
        </div>

        ${state.correct && state.level === 12 ? `
          <div class="trophy">
            <h3>🏆 ¡Completaste los 12 niveles!</h3>
            <p>Tu memoria visual es excepcional. Puntuación final: <b>${state.score} puntos</b>.</p>
          </div>` : ""}
      </section>`;
  }

  function bodyHtml(){
    if(state.phase === "menu") return menuHtml();
    if(state.phase === "start") return startHtml();
    if(state.phase === "showing") return showingHtml();
    if(state.phase === "input") return inputHtml();
    if(state.phase === "result") return resultHtml();
    return menuHtml();
  }

  function render(){
    root.innerHTML = `
      <main class="app">
        <div class="shell">
          ${headerHtml()}
          <div class="card">${bodyHtml()}</div>
          <p class="footer">ProfGermandario · Entrena tu mente</p>
        </div>
      </main>`;

    if(state.phase === "showing"){
      if(timer){ clearTimeout(timer); timer = null; }
      if(state.showingIndex < state.sequence.length){
        timer = setTimeout(()=>{
          setState({ showingIndex:state.showingIndex + 1 });
        }, LEVELS[state.level-1].show);
      }else{
        timer = setTimeout(()=>{
          setState({ phase:"input" });
        }, 700);
      }
    }
  }

  root.addEventListener("click", function(ev){
    const btn = ev.target.closest("[data-action]");
    if(!btn) return;

    const action = btn.getAttribute("data-action");
    if(action === "pick-level") pickLevel(Number(btn.getAttribute("data-level")));
    else if(action === "begin") beginLevel();
    else if(action === "menu"){ clearTimers(); setState({ phase:"menu" }); }
    else if(action === "reset") resetProgress();
    else if(action === "emoji") handleEmoji(btn.getAttribute("data-emoji"));
    else if(action === "hint") showHint();
    else if(action === "clear") clearInput();
    else if(action === "next") nextLevel();
  });

  render();
})();
</script>
</body>
</html>
