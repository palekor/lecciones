<style>
  :root{
    --lienzo:#FCF8F3; --nube:#F2ECE2; --tinta:#1A1730; --tintasoft:#3A3552; --bruma:#76718A;
    --coral:#FF5A3C; --coraldeep:#E8482C; --menta:#15B79E; --mentadeep:#0E8C79; --ambar:#FFB627;
    --paper:#F6F1FF; --violet:#7C5CFF; --ok:#15B79E; --err:#D64545;
    --linea:rgba(26,23,48,0.10); --linea-soft:rgba(26,23,48,0.06);
    --font-sans:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    --font-display:Georgia,"Times New Roman",serif;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
  }
  *,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
  html{ min-height:100%; }
  body{
    background:var(--lienzo); color:var(--tinta); font-family:var(--font-sans);
    min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent; padding-bottom:92px;
  }
  body::before{
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(60% 45% at 12% 0%, rgba(255,90,60,0.06), transparent 60%),
      radial-gradient(55% 55% at 100% 100%, rgba(124,92,255,0.07), transparent 60%);
  }
  button{ font:inherit; }
  .shell{ width:100%; max-width:760px; margin:0 auto; padding:0 18px; position:relative; z-index:10; }

  header{ text-align:center; padding:30px 0 6px; }
  .eyebrow{
    font-family:var(--font-mono); font-size:0.68rem; letter-spacing:0.26em; text-transform:uppercase;
    color:var(--coral); display:inline-flex; align-items:center; gap:10px;
  }
  .eyebrow::before{ content:''; width:24px; height:2px; background:var(--coral); border-radius:2px; }
  header h1{
    font-family:var(--font-display); font-weight:900; font-size:clamp(2.2rem,7vw,3.2rem); line-height:1.02;
    letter-spacing:-0.02em; margin:14px 0 2px;
    background:linear-gradient(120deg,var(--coral) 38%, var(--violet));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  header .sub{ color:var(--tintasoft); font-size:0.96rem; max-width:440px; margin:0 auto; }

  .wave{ display:flex; align-items:flex-end; gap:4px; height:28px; justify-content:center; margin:13px 0; }
  .wave i{
    display:block; width:4px; border-radius:4px; transform-origin:bottom;
    background:linear-gradient(to top,var(--menta),var(--coral) 60%,var(--ambar));
    animation:vox 1.3s ease-in-out infinite;
  }
  @keyframes vox{0%,100%{transform:scaleY(.25);}50%{transform:scaleY(1);}}

  .score{
    display:inline-flex; align-items:center; gap:8px; margin-top:12px; padding:7px 18px; border-radius:999px;
    background:#fff; border:1px solid var(--linea); font-family:var(--font-mono); font-size:0.8rem;
    color:var(--tinta); box-shadow:0 6px 18px rgba(26,23,48,0.05);
  }
  .score b{ color:var(--coral); }

  .row{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .modebar{ margin:18px 0 0; }
  .chip{
    padding:9px 16px; border-radius:999px; border:1.5px solid var(--linea); background:transparent; color:var(--tintasoft);
    font-family:var(--font-sans); font-size:0.84rem; font-weight:700; cursor:pointer; transition:all .2s; touch-action:manipulation;
  }
  .chip:hover{ border-color:var(--coral); color:var(--coral); }
  .chip.active{ background:var(--tinta); color:var(--paper); border-color:var(--tinta); }
  .catbar{ margin:12px 0 0; }
  .catchip{
    padding:6px 14px; border-radius:999px; border:1.5px solid var(--linea); background:transparent;
    font-family:var(--font-mono); font-size:0.7rem; letter-spacing:0.06em; cursor:pointer;
    transition:all .2s; color:var(--tintasoft); touch-action:manipulation;
  }

  .hint{
    text-align:center; font-size:0.84rem; color:var(--bruma); margin:18px 0;
    display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap;
  }
  .hint b{ color:var(--coral); }

  .content{ margin-top:6px; }
  .card{
    background:#fff; border:1px solid var(--linea-soft); border-left:4px solid var(--coral); border-radius:16px;
    padding:18px 20px; margin-bottom:12px; box-shadow:0 6px 18px rgba(26,23,48,0.05);
  }
  .badge{
    display:inline-block; padding:3px 11px; border-radius:999px; font-family:var(--font-mono); font-size:0.6rem;
    letter-spacing:0.1em; text-transform:uppercase; margin-bottom:9px;
  }
  .full{
    font-family:var(--font-display); font-weight:800; font-size:clamp(1.3rem,3.5vw,1.7rem);
    color:var(--tinta); display:inline-flex; align-items:center; gap:10px; flex-wrap:wrap;
  }
  .es{ font-size:1rem; color:var(--tinta); font-weight:700; margin:6px 0 2px; }
  .en{ font-size:0.9rem; color:var(--bruma); font-style:italic; }
  .example{
    font-size:0.95rem; color:var(--tintasoft); border-left:2px solid var(--linea);
    padding-left:12px; margin-top:10px; display:flex; align-items:flex-start; gap:10px;
  }
  .rulebox{
    margin-top:11px; padding:11px 14px; background:rgba(124,92,255,0.08);
    border:1px solid rgba(124,92,255,0.22); border-radius:12px;
    font-size:0.86rem; color:#5B43C4; line-height:1.55;
  }
  .rulelabel{
    font-family:var(--font-mono); font-size:0.6rem; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--violet); margin-bottom:4px;
  }

  .spk{
    flex-shrink:0; width:34px; height:34px; border-radius:999px; border:none;
    background:rgba(21,183,158,0.14); color:var(--mentadeep);
    cursor:pointer; font-size:0.95rem; display:inline-flex; align-items:center;
    justify-content:center; transition:background .2s, transform .15s; touch-action:manipulation;
  }
  .spk:hover{ background:rgba(21,183,158,0.24); }
  .spk:active{ transform:scale(.92); }
  .spk.sm{ width:28px; height:28px; font-size:0.8rem; }

  .fc-wrap{ max-width:540px; margin:0 auto; }
  .card3d{ perspective:1400px; height:clamp(300px,58vh,400px); }
  .card3d-inner{
    position:relative; width:100%; height:100%; transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.4,0,.2,1); cursor:pointer;
  }
  .card3d.flipped .card3d-inner{ transform:rotateY(180deg); }
  .card3d-face{
    position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border-radius:20px; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:26px; text-align:center; overflow-y:auto;
  }
  .card3d-front{ background:#fff; border:1.5px solid var(--linea); box-shadow:0 12px 32px rgba(26,23,48,0.08); }
  .card3d-back{ transform:rotateY(180deg); color:var(--paper); background:radial-gradient(120% 130% at 0% 0%, #2A2348 0%, #1A1730 70%); }

  .flash-title{
    font-family:var(--font-display); font-weight:900; font-size:clamp(1.8rem,6vw,2.8rem);
    color:var(--tinta); margin-bottom:14px; display:flex; align-items:center;
    gap:12px; flex-wrap:wrap; justify-content:center;
  }
  .tap-label{
    font-family:var(--font-mono); font-size:0.62rem; letter-spacing:0.2em;
    text-transform:uppercase; color:var(--coral);
  }
  .back-es{ font-family:var(--font-display); font-weight:700; font-size:clamp(1.5rem,5vw,2rem); color:var(--coral); margin-bottom:6px; }
  .back-en{ font-style:italic; color:var(--paper); opacity:0.7; margin-bottom:14px; font-size:0.95rem; }
  .back-example{ display:flex; align-items:center; gap:10px; color:var(--paper); font-weight:700; flex-wrap:wrap; justify-content:center; }

  .btn{
    display:inline-flex; align-items:center; gap:8px; padding:11px 22px; border-radius:999px;
    font-family:var(--font-sans); font-weight:700; font-size:0.92rem; cursor:pointer;
    border:none; transition:transform .15s, background .2s, border-color .2s; touch-action:manipulation;
  }
  .btn-primary{ background:var(--coral); color:#fff; box-shadow:0 8px 24px rgba(255,90,60,0.28); }
  .btn-primary:hover{ background:var(--coraldeep); }
  .btn-primary:active{ transform:scale(.97); }
  .btn-primary:disabled{ opacity:.5; cursor:not-allowed; }
  .btn-ghost{ background:transparent; color:var(--tintasoft); border:1.5px solid var(--linea); }
  .btn-ghost:hover{ border-color:var(--coral); color:var(--coral); }

  .opt{
    display:flex; align-items:center; gap:11px; width:100%; text-align:left; padding:14px 16px; border-radius:14px;
    border:1.5px solid var(--linea); background:#fff; color:var(--tinta); font-family:var(--font-sans);
    font-weight:700; font-size:0.98rem; cursor:pointer; transition:all .18s; line-height:1.4; touch-action:manipulation;
  }
  .opt:hover{ border-color:var(--coral); }
  .opt.correct{ background:rgba(21,183,158,0.14); border-color:var(--menta); color:var(--mentadeep); }
  .opt.wrong{ background:rgba(214,69,69,0.12); border-color:var(--err); color:var(--err); }
  .opt:disabled{ cursor:default; }
  .opt .mk{ font-family:var(--font-mono); flex-shrink:0; }

  .build-area{
    min-height:64px; background:rgba(255,90,60,0.05);
    border:1.5px dashed rgba(255,90,60,0.35); border-radius:14px;
    padding:12px 14px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:14px;
  }
  .build-area .ph{ color:var(--bruma); font-style:italic; font-size:0.92rem; }
  .tok{
    padding:8px 14px; border-radius:10px; font-family:var(--font-sans);
    font-weight:700; font-size:0.95rem; cursor:pointer; border:1.5px solid;
    transition:transform .12s; touch-action:manipulation;
  }
  .tok:active{ transform:scale(.95); }
  .tok-sel{ background:rgba(255,90,60,0.14); border-color:rgba(255,90,60,0.45); color:var(--coraldeep); }
  .tok-bank{ background:#fff; border-color:var(--linea); color:var(--tinta); }
  .bank{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }

  .center{ text-align:center; }
  .counter{
    font-family:var(--font-mono); font-size:0.62rem; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--bruma); margin-bottom:14px; text-align:center;
  }
  .res{ font-family:var(--font-display); font-weight:800; font-size:1.4rem; margin-bottom:10px; }

  .wa-fab{
    position:fixed; z-index:70; display:flex; align-items:center; gap:8px; background:#25D366; color:#fff;
    font-family:var(--font-sans); font-weight:700; text-decoration:none; border-radius:999px;
    box-shadow:0 10px 30px rgba(37,211,102,.45); padding:13px 18px; transition:transform .2s;
  }
  .wa-fab:active{ transform:scale(.95); }
  @media(max-width:420px){ .wa-label{ display:none; } }
  .foot{
    text-align:center; margin-top:18px; font-family:var(--font-mono); font-size:0.62rem;
    letter-spacing:0.1em; text-transform:uppercase; color:var(--bruma);
  }
  :focus-visible{ outline:3px solid var(--coral); outline-offset:3px; border-radius:10px; }
  @media(prefers-reduced-motion:reduce){
    .wave i{ animation:none; transform:scaleY(.6); }
    .card3d-inner{ transition:none; }
  }
</style>

(function(){

  const DATA = [
    {full:"get up", es:"levantarse", en:"to rise from bed", example:"I get up at 6 every morning.", category:"get", type:"phrasal"},

    {full:"have [alguien] do", es:"hacer que alguien haga algo", en:"to arrange for someone to do something", example:"I had her do the report.", category:"have", type:"causative", rule:"HAVE + persona + infinitivo SIN «to»: «I had him fix it.» ✅  |  «I had him to fix it.» ❌"},

    {full:"have to", es:"tener que (obligación)", en:"obligation or necessity", example:"You have to practice every day.", category:"have", type:"modal", rule:"HAVE TO + infinitivo: «I have to go.» ✅  |  «I have to going.» ❌"},
    {full:"have a hard time + -ing", es:"costar trabajo hacer algo", en:"to find something difficult", example:"I have a hard time remembering names.", category:"have", type:"expression"},

    {full:"can", es:"poder (habilidad/permiso)", en:"ability, possibility or permission", example:"She can speak three languages.", category:"can", type:"modal", rule:"CAN + infinitivo SIN «to»: «I can do it.» ✅  |  «I can to do it.» ❌ NUNCA «to» después de CAN."},

    {full:"could", es:"podía / podría", en:"past ability or polite possibility", example:"Could you repeat that, please?", category:"can", type:"modal", rule:"COULD + infinitivo: «Could you help?» ✅  |  «Could you to help?» ❌"},

    {q:"«Could you ___ that again?»", options:["to repeat","repeating","repeat","repeated"], correct:2, explain:"Los modales (can, could, will, would, should) llevan infinitivo SIN «to». «Could you repeat?» ✅"},
    {q:"¿Cuál usa LIKE para un deseo cortés?", options:["I'd like going.","I'd like to go.","I'd like go.","I like to going."], correct:1, explain:"WOULD LIKE + «to» + infinitivo: «I'd like to go.» ✅"},
    {q:"Obligación con HAVE TO:", options:["I have to going.","I have go.","I have to go.","I have going to."], correct:2, explain:"HAVE TO + infinitivo: «I have to go.» ✅  Sin -ing."},
    {q:"«She is continuing her studies.» Con KEEP:", options:["She keeps to study.","She keeps study.","She keeps studied.","She keeps studying."], correct:3, explain:"KEEP + verbo-ing: «She keeps studying.» ✅"},
    {q:"«He ___ her call yesterday.» (HAVE causativo, pasado)", options:["had her to call","had her call","had her calling","got her call"], correct:1, explain:"HAVE + persona + infinitivo SIN «to»: «He had her call.» ✅"}
  ];

  const CHALLENGES = [
    {prompt:"WANT + TO + phrasal verb:", parts:["get","I","up","to","want","early."], correct:"I want to get up early.", rule:"verbo + «to» + phrasal verb (get up)"},
    {prompt:"DECIDE + TO + phrasal verb:", parts:["over","She","take","to","the","decided","company."], correct:"She decided to take over the company.", rule:"decide + «to» + phrasal verb (take over)"},
    {prompt:"NEED + TO + phrasal verb:", parts:["along.","get","need","We","to"], correct:"We need to get along.", rule:"need + «to» + phrasal verb (get along)"},
    {prompt:"TRY + TO + phrasal verb:", parts:["give","He","up","trying","to","smoking.","is"], correct:"He is trying to give up smoking.", rule:"try + «to» + phrasal verb (give up)"},
    {prompt:"CAN no lleva «to». Arma la frase:", parts:["can","speak","I","to","English","fluently."], correct:"I can speak English fluently.", rule:"CAN + infinitivo SIN «to»"},
    {prompt:"HAVE causativo no lleva «to»:", parts:["had","She","do","him","to","it."], correct:"She had him do it.", rule:"HAVE + persona + infinitivo SIN «to»"},
    {prompt:"GET causativo SÍ lleva «to»:", parts:["got","to","her","I","present.","the"], correct:"I got her to present.", rule:"GET + persona + «to» + verbo"},
    {prompt:"KEEP + -ing:", parts:["keeps","trying.","She","try.","to"], correct:"She keeps trying.", rule:"KEEP + verbo-ing"},
    {prompt:"WOULD LIKE + TO:", parts:["like","I'd","to","improve","English.","my","going"], correct:"I'd like to improve my English.", rule:"WOULD LIKE + «to» + infinitivo"},
    {prompt:"HAVE algo DONE:", parts:["had","my","I","car","repaired.","to"], correct:"I had my car repaired.", rule:"HAVE + cosa + participio"}
  ];

  const CC = Object.fromEntries(CATEGORIES.map(c => [c.id, c.color]));
  const root = document.getElementById("root");

  const state = {
    mode:"explore",
    cat:"all",
    score:0,
    flashIdx:0,
    flashFlip:false,
    quiz:null,
    ruleOrder:shuffle(RULES),
    ruleIdx:0,
    ruleChosen:null,
    ruleDone:false,
    builderOrder:shuffle(CHALLENGES),
    builderIdx:0,
    builderSelected:[],
    builderBank:[],
    builderResult:null
  };

  function escapeHTML(value){
    return String(value)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#039;");
  }

  function attr(value){ return escapeHTML(value); }
  function shuffle(arr){ return [...arr].sort(() => Math.random() - 0.5); }
  function pick(arr,n){ return shuffle(arr).slice(0,n); }
  function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
  function hexA(hex,a){
    const n = parseInt(hex.slice(1),16);
    return "rgba(" + (((n>>16)&255)) + "," + (((n>>8)&255)) + "," + (n&255) + "," + a + ")";
  }
  function cleanVerb(full){
    return full
      .replace(/\[.*?\]/g,"")
      .replace(/\(.*?\)/g,"")
      .replace(/\+?\s*-ing/g,"")
      .replace(/—/g,"")
      .replace(/\s+/g," ")
      .trim();
  }
  function speak(text){
    try{
      if(!("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.9;
      window.speechSynthesis.speak(utterance);
    }catch(e){}
  }
  function getData(){
    return state.cat === "all" ? DATA : DATA.filter(v => v.category === state.cat);
  }
  function addScore(points){
    state.score += points;
  }
  function spk(text, small){
    return '<button class="spk' + (small ? ' sm' : '') + '" aria-label="Escuchar" data-speak="' + attr(text) + '">🔊</button>';
  }
  function waveHTML(){
    let out = "";
    for(let i=0;i<22;i++){
      const height = 8 + Math.abs(Math.sin(i*0.6))*18;
      const delay = i*0.07;
      const duration = 1.1 + (i%5)*0.12;
      out += '<i style="height:' + height.toFixed(2) + 'px; animation-delay:' + delay.toFixed(2) + 's; animation-duration:' + duration.toFixed(2) + 's"></i>';
    }
    return out;
  }

  function headerHTML(){
    return `
      <header>
        <span class="eyebrow">Lección 5 · Verbos complejos</span>
        <h1>Phrasal Verbs</h1>
        <div class="wave">${waveHTML()}</div>
        <p class="sub">Verbos que cambian de significado — y los patrones con (y sin) «to».</p>
        <div class="score">⭐ Puntos: <b>${state.score}</b></div>
      </header>
    `;
  }

  function modebarHTML(){
    return `
      <div class="row modebar">
        ${MODES.map(m => `
          <button class="chip${state.mode === m.id ? ' active' : ''}" data-mode="${m.id}">${escapeHTML(m.label)}</button>
        `).join("")}
      </div>
    `;
  }

  function catbarHTML(){
    const show = ["explore","flash","quiz"].includes(state.mode);
    if(!show) return "";
    return `
      <div class="row catbar">
        ${CATEGORIES.map(c => {
          const active = state.cat === c.id;
          const st = active ? `style="background:${hexA(c.color,0.14)}; border-color:${c.color}; color:${c.color}"` : "";
          return `<button class="catchip" data-cat="${c.id}" ${st}>${escapeHTML(c.label)}</button>`;
        }).join("")}
      </div>
    `;
  }

  function exploreHTML(){
    const data = getData();
    return `
      <div class="content">
        <p class="hint">Toca <b>🔊</b> para escuchar. El recuadro morado explica el uso de <b>«to»</b>.</p>
        ${data.map(v => {
          const c = CC[v.category];
          return `
            <div class="card" style="border-left-color:${c}">
              <span class="badge" style="background:${hexA(c,0.13)}; color:${c}">${escapeHTML(v.category)}</span>
              <div class="full">${escapeHTML(v.full)} ${spk(v.example)}</div>
              <div class="es">${escapeHTML(v.es)}</div>
              <div class="en">${escapeHTML(v.en)}</div>
              <div class="example">“${escapeHTML(v.example)}”</div>
              ${v.rule ? `<div class="rulebox"><div class="rulelabel">⚖️ Regla</div>${escapeHTML(v.rule)}</div>` : ""}
            </div>
          `;
        }).join("")}
      </div>
    `;
  }

  function flashHTML(){
    const data = getData();
    if(data.length === 0) return "";
    const idx = ((state.flashIdx % data.length) + data.length) % data.length;
    const card = data[idx];
    const c = CC[card.category];
    return `
      <div class="content fc-wrap">
        <p class="hint">Toca la tarjeta para ver el <b>significado</b>.</p>
        <div class="counter">Tarjeta ${idx+1} de ${data.length}</div>
        <div class="card3d${state.flashFlip ? ' flipped' : ''}" role="button" tabindex="0" data-action="flash-card" aria-label="Tarjeta de estudio">
          <div class="card3d-inner">
            <div class="card3d-face card3d-front">
              <span class="badge" style="background:${hexA(c,0.13)}; color:${c}">${escapeHTML(card.category)}</span>
              <div class="flash-title">${escapeHTML(card.full)} ${spk(card.example)}</div>
              <div class="tap-label">toca para revelar</div>
            </div>
            <div class="card3d-face card3d-back">
              <span class="badge" style="background:rgba(246,241,255,0.12); color:var(--ambar)">${escapeHTML(card.type)}</span>
              <div class="back-es">${escapeHTML(card.es)}</div>
              <div class="back-en">${escapeHTML(card.en)}</div>
              <div class="back-example">“${escapeHTML(card.example)}” ${spk(card.example, true)}</div>
              ${card.rule ? `<div class="rulebox" style="margin-top:14px; background:rgba(167,139,250,0.18); border:1px solid rgba(167,139,250,0.35); color:#D9CCFF"><div class="rulelabel" style="color:#C4ABFF">⚖️ Regla</div>${escapeHTML(card.rule)}</div>` : ""}
            </div>
          </div>
        </div>
        <div class="row" style="margin-top:22px">
          <button class="btn btn-ghost" data-action="flash-prev">← Anterior</button>
          <button class="btn btn-primary" data-action="flash-flip">${state.flashFlip ? "Ocultar" : "Revelar"}</button>
          <button class="btn btn-ghost" data-action="flash-next">Siguiente →</button>
        </div>
      </div>
    `;
  }

  function buildQuiz(){
    const data = getData();
    const correct = rand(data);
    const distract = pick(data.filter(v => v.es !== correct.es), 3).map(v => v.es);
    state.quiz = {
      correct,
      options: shuffle([correct.es, ...distract]),
      chosen: null,
      done: false
    };
  }

  function quizHTML(){
    const data = getData();
    if(data.length < 2){
      return `<div class="content"><p class="hint">Esta categoría necesita más elementos para el quiz.</p></div>`;
    }
    if(!state.quiz) buildQuiz();
    const q = state.quiz;
    const c = CC[q.correct.category];
    return `
      <div class="content" style="max-width:640px; margin:0 auto">
        <p class="hint">Elige el <b>significado en español</b> del phrasal verb.</p>
        <div class="card" style="border-left-color:${c}; text-align:center">
          <span class="badge" style="background:${hexA(c,0.13)}; color:${c}">${escapeHTML(q.correct.category)}</span>
          <div class="flash-title" style="font-size:clamp(1.6rem,5vw,2.3rem)">
            ${escapeHTML(q.correct.full)} ${spk(cleanVerb(q.correct.full))}
          </div>
          <div style="color:var(--bruma); font-style:italic; margin-top:4px">¿Qué significa?</div>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px; margin:14px 0">
          ${q.options.map((opt,i) => {
            let cls = "opt";
            if(q.done){
              if(opt === q.correct.es) cls = "opt correct";
              else if(opt === q.chosen) cls = "opt wrong";
            }
            return `<button class="${cls}" ${q.done ? "disabled" : ""} data-action="quiz-answer" data-index="${i}">${escapeHTML(opt)}</button>`;
          }).join("")}
        </div>
        ${q.done ? `
          <div class="center">
            <div class="res" style="color:${q.chosen === q.correct.es ? "var(--mentadeep)" : "var(--err)"}">${q.chosen === q.correct.es ? "✅ ¡Correcto!" : "❌ Casi…"}</div>
            ${q.correct.rule ? `<div class="rulebox" style="text-align:left; margin-bottom:14px"><div class="rulelabel">⚖️ Regla</div>${escapeHTML(q.correct.rule)}</div>` : ""}
            <button class="btn btn-primary" data-action="quiz-next">Siguiente →</button>
          </div>
        ` : ""}
      </div>
    `;
  }

  function rulesHTML(){
    const q = state.ruleOrder[state.ruleIdx % state.ruleOrder.length];
    return `
      <div class="content" style="max-width:680px; margin:0 auto">
        <p class="hint">¿La frase lleva <b>«to»</b> o no? Elige la correcta.</p>
        <div class="counter">Regla ${(state.ruleIdx % state.ruleOrder.length)+1} de ${state.ruleOrder.length}</div>
        <div class="card" style="border-left-color:var(--violet)">
          <span class="badge" style="background:rgba(124,92,255,0.13); color:var(--violet)">Gramática</span>
          <div style="font-size:clamp(1.05rem,2.6vw,1.35rem); color:var(--tinta); line-height:1.5; font-weight:700">${escapeHTML(q.q)}</div>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px; margin:14px 0">
          ${q.options.map((opt,i) => {
            let cls = "opt";
            let mark = "◯";
            if(state.ruleDone){
              if(i === q.correct){ cls = "opt correct"; mark = "✅"; }
              else if(i === state.ruleChosen){ cls = "opt wrong"; mark = "❌"; }
            }
            return `<button class="${cls}" ${state.ruleDone ? "disabled" : ""} data-action="rule-answer" data-index="${i}"><span class="mk">${mark}</span><span>${escapeHTML(opt)}</span></button>`;
          }).join("")}
        </div>
        ${state.ruleDone ? `
          <div class="center">
            <div class="rulebox" style="text-align:left; margin-bottom:14px"><div class="rulelabel">📝 Explicación</div>${escapeHTML(q.explain)}</div>
            <div class="row" style="justify-content:center">
              <button class="btn btn-ghost" data-speak="${attr(q.options[q.correct])}">🔊 Escuchar</button>
              <button class="btn btn-primary" data-action="rule-next">Siguiente →</button>
            </div>
          </div>
        ` : ""}
      </div>
    `;
  }

  function ensureBuilder(){
    if(state.builderBank.length === 0 && state.builderSelected.length === 0 && !state.builderResult){
      const ch = state.builderOrder[state.builderIdx % state.builderOrder.length];
      state.builderBank = shuffle(ch.parts);
    }
  }

  function builderHTML(){
    ensureBuilder();
    const ch = state.builderOrder[state.builderIdx % state.builderOrder.length];
    return `
      <div class="content" style="max-width:680px; margin:0 auto">
        <p class="hint">Toca las palabras en orden. <b>Ojo con el «to».</b></p>
        <div class="counter">Reto ${(state.builderIdx % state.builderOrder.length)+1} de ${state.builderOrder.length}</div>
        <div class="card" style="border-left-color:var(--coral)">
          <span class="badge" style="background:rgba(255,90,60,0.13); color:var(--coraldeep)">Armar frase</span>
          <div style="font-size:clamp(1rem,2.4vw,1.2rem); color:var(--tinta); font-weight:700; margin-bottom:8px">${escapeHTML(ch.prompt)}</div>
          <div class="rulebox"><div class="rulelabel">Patrón</div>${escapeHTML(ch.rule)}</div>
        </div>
        <div class="build-area">
          ${state.builderSelected.length === 0 ? '<span class="ph">Toca las palabras para armar tu frase…</span>' : ""}
          ${state.builderSelected.map((w,i) => `<button class="tok tok-sel" data-action="builder-drop" data-index="${i}">${escapeHTML(w)}</button>`).join("")}
        </div>
        <div class="bank">
          ${state.builderBank.map((w,i) => `<button class="tok tok-bank" data-action="builder-take" data-index="${i}">${escapeHTML(w)}</button>`).join("")}
        </div>
        ${!state.builderResult ? `
          <div class="row" style="justify-content:center">
            <button class="btn btn-ghost" data-action="builder-reset">Reiniciar</button>
            <button class="btn btn-primary" ${state.builderSelected.length === 0 ? "disabled" : ""} data-action="builder-check">Revisar ✓</button>
          </div>
        ` : `
          <div class="center">
            <div class="res" style="color:${state.builderResult === "ok" ? "var(--mentadeep)" : "var(--err)"}">${state.builderResult === "ok" ? "✅ ¡Frase perfecta!" : "❌ Casi…"}</div>
            ${state.builderResult === "no" ? `<div class="rulebox" style="text-align:left; margin-bottom:12px"><div class="rulelabel">Respuesta correcta</div>${escapeHTML(ch.correct)}</div>` : ""}
            <div class="row" style="justify-content:center">
              <button class="btn btn-ghost" data-speak="${attr(ch.correct)}">🔊 Escuchar</button>
              ${state.builderResult === "no" ? '<button class="btn btn-ghost" data-action="builder-reset">Reintentar</button>' : ""}
              <button class="btn btn-primary" data-action="builder-next">Siguiente →</button>
            </div>
          </div>
        `}
      </div>
    `;
  }

  function contentHTML(){
    if(state.mode === "explore") return exploreHTML();
    if(state.mode === "flash") return flashHTML();
    if(state.mode === "quiz") return quizHTML();
    if(state.mode === "rules") return rulesHTML();
    if(state.mode === "builder") return builderHTML();
    return "";
  }

  function render(){
    root.innerHTML = `
      ${headerHTML()}
      ${modebarHTML()}
      ${catbarHTML()}
      ${contentHTML()}
      <p class="foot">ProfGermandario · Domina el inglés</p>
    `;
  }

  function resetForMode(mode){
    state.mode = mode;
    if(mode === "flash"){ state.flashIdx = 0; state.flashFlip = false; }
    if(mode === "quiz"){ state.quiz = null; }
    if(mode === "rules"){
      state.ruleChosen = null;
      state.ruleDone = false;
    }
    if(mode === "builder"){
      state.builderSelected = [];
      state.builderBank = [];
      state.builderResult = null;
    }
  }

  function resetBuilderCurrent(){
    const ch = state.builderOrder[state.builderIdx % state.builderOrder.length];
    state.builderSelected = [];
    state.builderBank = shuffle(ch.parts);
    state.builderResult = null;
  }

  root.addEventListener("click", function(event){
    const speakBtn = event.target.closest("[data-speak]");
    if(speakBtn){
      event.stopPropagation();
      speak(speakBtn.getAttribute("data-speak") || "");
      return;
    }

    const modeBtn = event.target.closest("[data-mode]");
    if(modeBtn){
      resetForMode(modeBtn.getAttribute("data-mode"));
      render();
      return;
    }

    const catBtn = event.target.closest("[data-cat]");
    if(catBtn){
      state.cat = catBtn.getAttribute("data-cat");
      state.flashIdx = 0;
      state.flashFlip = false;
      state.quiz = null;
      render();
      return;
    }

    const actionEl = event.target.closest("[data-action]");
    if(!actionEl) return;
    const action = actionEl.getAttribute("data-action");

    if(action === "flash-card" || action === "flash-flip"){
      state.flashFlip = !state.flashFlip;
      render();
      return;
    }
    if(action === "flash-prev"){
      const data = getData();
      state.flashFlip = false;
      state.flashIdx = (state.flashIdx - 1 + data.length) % data.length;
      render();
      return;
    }
    if(action === "flash-next"){
      const data = getData();
      state.flashFlip = false;
      state.flashIdx = (state.flashIdx + 1) % data.length;
      render();
      return;
    }

    if(action === "quiz-answer"){
      if(!state.quiz || state.quiz.done) return;
      const index = Number(actionEl.getAttribute("data-index"));
      const opt = state.quiz.options[index];
      state.quiz.chosen = opt;
      state.quiz.done = true;
      if(opt === state.quiz.correct.es) addScore(10);
      render();
      return;
    }
    if(action === "quiz-next"){
      state.quiz = null;
      render();
      return;
    }

    if(action === "rule-answer"){
      if(state.ruleDone) return;
      const index = Number(actionEl.getAttribute("data-index"));
      state.ruleChosen = index;
      state.ruleDone = true;
      const q = state.ruleOrder[state.ruleIdx % state.ruleOrder.length];
      if(index === q.correct) addScore(15);
      render();
      return;
    }
    if(action === "rule-next"){
      state.ruleIdx += 1;
      state.ruleChosen = null;
      state.ruleDone = false;
      render();
      return;
    }

    if(action === "builder-take"){
      if(state.builderResult) return;
      const index = Number(actionEl.getAttribute("data-index"));
      const word = state.builderBank[index];
      state.builderSelected.push(word);
      state.builderBank.splice(index, 1);
      render();
      return;
    }
    if(action === "builder-drop"){
      if(state.builderResult) return;
      const index = Number(actionEl.getAttribute("data-index"));
      const word = state.builderSelected[index];
      state.builderBank.push(word);
      state.builderSelected.splice(index, 1);
      render();
      return;
    }
    if(action === "builder-check"){
      const ch = state.builderOrder[state.builderIdx % state.builderOrder.length];
      const answer = state.builderSelected.join(" ");
      state.builderResult = answer === ch.correct ? "ok" : "no";
      if(state.builderResult === "ok") addScore(20);
      render();
      return;
    }
    if(action === "builder-reset"){
      resetBuilderCurrent();
      render();
      return;
    }
    if(action === "builder-next"){
      state.builderIdx += 1;
      state.builderSelected = [];
      state.builderBank = [];
      state.builderResult = null;
      render();
      return;
    }
  });

  root.addEventListener("keydown", function(event){
    const card = event.target.closest('[data-action="flash-card"]');
    if(card && (event.key === "Enter" || event.key === " ")){
      event.preventDefault();
      state.flashFlip = !state.flashFlip;
      render();
    }
  });

  render();
})();
</script>
</body>
</html>
