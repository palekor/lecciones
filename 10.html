const rand=(min,max)=>Math.floor(Math.random()*(max-min+1))+min;
const shuffle=arr=>{const a=[...arr];for(let i=a.length-1;i>0;i--){const j=rand(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;};
const choice=arr=>arr[rand(0,arr.length-1)];

function spawnCoins(n=8){
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const coin=document.createElement('span');
      coin.className='coin';coin.textContent='🪙';
      coin.style.left=rand(5,90)+'vw';
      coin.style.animationDuration=rand(12,22)*0.1+'s';
      document.body.appendChild(coin);
      coin.addEventListener('animationend',()=>coin.remove());
    },i*60);
  }
}

/* ─── TTS ─────────────────────────────────────────────────────── */
function useSpeech(){
  const [speaking,setSpeaking]=useState(false);
  const speak=useCallback((text,rate=0.9)=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="en-US";u.rate=rate;u.pitch=1.05;
    const voices=window.speechSynthesis.getVoices();
    const pref=voices.find(v=>v.lang==="en-US"&&(v.name.includes("Samantha")||v.name.includes("Google")||v.name.includes("Natural")));
    if(pref)u.voice=pref;
    u.onstart=()=>setSpeaking(true);
    u.onend=()=>setSpeaking(false);
    u.onerror=()=>setSpeaking(false);
    window.speechSynthesis.speak(u);
  },[]);
  const stop=useCallback(()=>{window.speechSynthesis?.cancel();setSpeaking(false);},[]);
  useEffect(()=>()=>stop(),[]);
  return{speak,stop,speaking};
}

function SpeakBtn({text,label="",rate=0.88,size="sm"}){
  const{speak,stop,speaking}=useSpeech();
  const base=size==="md"
    ?"rounded-full px-4 py-2 text-sm font-semibold gap-2 border"
    :"rounded-full px-2.5 py-1 text-xs font-semibold gap-1.5 border";
  return(
    <button onClick={()=>speaking?stop():speak(text,rate)}
      className={`inline-flex items-center transition lift ${base} ${speaking?"border-gold/60 bg-goldglow text-golddark":"border-tinta/15 text-bruma hover:border-gold/50 hover:text-gold bg-white/70"}`}
      aria-label={speaking?"Stop":"Speak"}>
      <span className={speaking?"speaking":""} aria-hidden="true">{speaking?"⏹":"🔊"}</span>
      {label&&<span>{speaking?"Stop":label}</span>}
    </button>
  );
}

═══════════════════════════════════════════════════════════════ */
function VaultSprint({addScore,setStreak,streak}){
  const[pool]=useState(()=>shuffle(WORDS));
  const[idx,setIdx]=useState(0);
  const[options,setOptions]=useState([]);
  const[chosen,setChosen]=useState(null);
  const[correct,setCorrect]=useState(0);
  const[wrong,setWrong]=useState(0);
  const[done,setDone]=useState(false);
  const total=20;

  const build=useCallback((i,p)=>{
    const target=p[i];
    const dist=shuffle(p.filter(w=>w.word!==target.word)).slice(0,3);
    setOptions(shuffle([target,...dist]));
    setChosen(null);
  },[]);

  useEffect(()=>{if(!done)build(idx,pool);},[idx]);

  const pick=w=>{
    if(chosen)return;
    setChosen(w);
    if(w.word===pool[idx].word){setCorrect(c=>c+1);addScore(10+Math.min(streak,5));setStreak(s=>s+1);spawnCoins(3);}
    else{setWrong(e=>e+1);addScore(-3);setStreak(0);}
    setTimeout(()=>{if(idx+1>=total)setDone(true);else setIdx(i=>i+1);},900);
  };

  if(done){
    const pct=Math.round(correct/total*100);
    if(pct>=90)setTimeout(()=>spawnCoins(18),100);
    return(
      <div className="max-w-2xl mx-auto text-center pop">
        <div className="text-6xl mb-4">{pct>=90?"💰":pct>=70?"💵":"📉"}</div>
        <h2 className="font-display font-black text-4xl sm:text-5xl text-tinta mb-2">Vault cleared</h2>
        <p className="text-tintasoft mb-6">{correct}/{total} correct · <b className="text-gold">{pct}% accuracy</b></p>
        <div className={`rounded-3xl p-5 mb-6 border ${pct>=90?"bg-gold/10 border-gold/30":pct>=70?"bg-menta/10 border-menta/30":"bg-coral/10 border-coral/30"}`}>
          <p className="font-display text-2xl">{pct>=90?"🏦 Billionaire-grade recall":pct>=70?"⚡ Getting there, keep grinding":"🧠 Vocabulary needs more reps"}</p>
        </div>
      </div>
    );
  }

  const current=pool[idx];
  const c=CAT_COLORS[current.cat]||CAT_COLORS.Power;
  return(
    <div className="max-w-2xl mx-auto">
      <Hint>See the definition → pick the right word. Speed matters, but accuracy earns gold.</Hint>
      <div className="grid grid-cols-3 gap-2 mb-4">
        <Stat label="Word" value={`${idx+1}/${total}`}/>
        <Stat label="Correct" value={correct} gold/>
        <Stat label="Wrong" value={wrong} hot={wrong>3}/>
      </div>
      <div className="h-2 rounded-full bg-nube overflow-hidden mb-6">
        <div className="h-full meter-gold transition-all duration-300" style={{width:`${(idx/total)*100}%`}}/>
      </div>
      <div className="rounded-[28px] bg-lienzo border border-tinta/5 p-6 mb-5 text-center shadow-soft">
        <p className="font-mono text-[0.62rem] tracking-[0.2em] uppercase text-gold mb-3">Choose the correct word</p>
        <p className="font-display font-bold text-2xl sm:text-3xl text-tinta leading-tight">{current.def}</p>
        <span className={`inline-block mt-3 font-mono text-xs px-3 py-1 rounded-full border ${c.bg} ${c.border} ${c.text}`}>{current.cat}</span>
      </div>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        {options.map(w=>{
          let s="bg-lienzo border-tinta/8 hover:border-gold/60 hover:bg-goldglow/30";
          if(chosen){if(w.word===current.word)s="bg-gold/15 border-gold/60 text-golddark";else if(w.word===chosen.word)s="bg-coral/15 border-coral/40 text-coral";else s="opacity-40 bg-nube border-tinta/5";}
          return(
            <button key={w.word} onClick={()=>pick(w)}
              className={`rounded-2xl border p-4 text-left transition-all lift ${s}`}>
              <span className="font-display font-black text-xl text-tinta">{w.word}</span>
            </button>
          );
        })}
      </div>
      {chosen&&(
        <div className={`mt-4 rounded-2xl p-3 text-center font-semibold pop ${chosen.word===current.word?"bg-gold/15 text-golddark":"bg-coral/12 text-coral"}`}>
          {chosen.word===current.word?"🪙 Correct!":`❌ It was: "${current.word}"`}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   MEMORY RECALL — rounds progress 3 → 4 → 5 → 6 → 7 → 8
═══════════════════════════════════════════════════════════════ */
function MemoryRecall({addScore,setStreak}){
  /* roundNum is the internal progression counter, fully independent of global level */
  const[roundNum,setRoundNum]=useState(0); // 0=3 words, 1=4, ... 5=8 words
  const seqLen=Math.min(3+roundNum,8);
  const maxRound=5; // 0-5 = 3-8 words

  const[phase,setPhase]=useState("start");
  const[sequence,setSequence]=useState([]);
  const[showIdx,setShowIdx]=useState(0);
  const[available,setAvailable]=useState([]);
  const[picked,setPicked]=useState([]);
  const[success,setSuccess]=useState(false);

  const begin=()=>{
    const seq=shuffle(WORDS).slice(0,seqLen);
    const others=shuffle(WORDS.filter(w=>!seq.find(s=>s.word===w.word))).slice(0,Math.max(4,12-seqLen));
    setSequence(seq);
    setAvailable(shuffle([...seq,...others]));
    setPicked([]);setShowIdx(0);setPhase("showing");
  };

  useEffect(()=>{
    if(phase==="showing"&&showIdx<sequence.length){
      const t=setTimeout(()=>setShowIdx(i=>i+1),2200);
      return()=>clearTimeout(t);
    }
    if(phase==="showing"&&showIdx>=sequence.length){
      const t=setTimeout(()=>setPhase("input"),800);
      return()=>clearTimeout(t);
    }
  },[phase,showIdx,sequence.length]);

  const pickWord=w=>{
    if(phase!=="input")return;
    if(picked.find(p=>p.word===w.word))return;
    const next=[...picked,w];
    setPicked(next);
    if(next.length===seqLen){
      const ok=next.every((p,i)=>p.word===sequence[i].word);
      setSuccess(ok);
      setPhase("result");
      if(ok){addScore(seqLen*20);setStreak(s=>s+1);spawnCoins(seqLen*2);}
      else{setStreak(0);}
    }
  };

  const nextRound=()=>{
    const next=Math.min(roundNum+1,maxRound);
    setRoundNum(next);
    setPicked([]);setSequence([]);setAvailable([]);
    setPhase("start");
  };

  const retryRound=()=>{
    setPicked([]);setSequence([]);setAvailable([]);
    setPhase("start");
  };

  const resetAll=()=>{setRoundNum(0);setPicked([]);setSequence([]);setAvailable([]);setPhase("start");};

  /* Progress bar for rounds */
  const RoundBar=()=>(
    <div className="flex items-center gap-2 mb-5">
      {Array.from({length:maxRound+1}).map((_,i)=>(
        <div key={i} className={`h-2 flex-1 rounded-full transition-all ${
          i<roundNum?"bg-gold":i===roundNum?"meter-gold":""
        }`}
          style={i===roundNum?{background:"linear-gradient(90deg,var(--gold),var(--ambar))"}:i<roundNum?{}:{background:"rgba(26,23,48,.1)"}}/>
      ))}
      <span className="font-mono text-xs text-bruma shrink-0">{seqLen} words</span>
    </div>
  );

  if(phase==="start") return(
    <div className="max-w-2xl mx-auto text-center">
      <Hint>Words appear one by one. Memorize the sequence. Then rebuild it in exact order.</Hint>
      <RoundBar/>
      <div className="bg-lienzo border border-tinta/5 rounded-[28px] p-8 mb-6 shadow-soft">
        <div className="text-5xl mb-4">🧠</div>
        <h2 className="font-display font-black text-4xl text-tinta mb-3">Memory Recall</h2>
        <div className="flex items-center justify-center gap-2 mb-3">
          <Pill className="bg-gold/15 border border-gold/30 text-golddark">Round {roundNum+1} of {maxRound+1}</Pill>
          <Pill className="bg-tinta/8 border border-tinta/15 text-tintasoft">{seqLen} words</Pill>
        </div>
        <p className="text-tintasoft text-sm">Study each word. Then select them <b>in the same order</b>.</p>
        {roundNum>0&&(
          <p className="text-xs text-bruma mt-2 italic">Each successful round adds one more word to memorize.</p>
        )}
      </div>
      <div className="flex gap-2 justify-center flex-wrap">
        <button onClick={begin}
          className="bg-gold text-white font-semibold rounded-full px-10 py-4 shadow-gold hover:bg-golddark transition text-lg">
          Start Round {roundNum+1} 🪙
        </button>
        {roundNum>0&&(
          <button onClick={resetAll}
            className="border border-tinta/15 text-bruma font-semibold rounded-full px-6 py-4 text-sm hover:border-coral hover:text-coral transition">
            Reset to Round 1
          </button>
        )}
      </div>
    </div>
  );

  if(phase==="showing") return(
    <div className="max-w-3xl mx-auto">
      <RoundBar/>
      <Hint>Memorize the words in this order. You will reconstruct the sequence right after.</Hint>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
        {sequence.map((w,i)=>(
          <div key={w.word}
            className={`rounded-[22px] border p-4 transition-all duration-500 ${
              i<showIdx?"bg-goldglow border-gold/50 opacity-75":
              i===showIdx?"pulse-gold bg-goldglow border-gold shadow-gold":
              "bg-nube border-tinta/5 opacity-25"}`}>
            <div className="flex items-center gap-2 mb-2">
              <span className="font-mono text-[0.6rem] text-gold">#{i+1}</span>
              <span className="font-display font-black text-2xl text-tinta">{i<=showIdx?w.word:"???"}</span>
            </div>
            {i<=showIdx&&<p className="text-xs text-tintasoft leading-snug">{w.def}</p>}
          </div>
        ))}
      </div>
      <p className="text-center font-mono text-sm text-bruma">
        Showing {Math.min(showIdx+1,seqLen)} of {seqLen}
      </p>
    </div>
  );

  if(phase==="input") return(
    <div className="max-w-3xl mx-auto">
      <RoundBar/>
      <Hint>Tap the words in the exact order you saw them. Slots fill left to right.</Hint>
      {/* Slots */}
      <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-5">
        {sequence.map((_,i)=>(
          <div key={i} className={`rounded-2xl border-2 border-dashed p-4 min-h-[68px] flex items-center ${
            picked[i]?"border-gold/50 bg-goldglow/50":"border-tinta/10 bg-nube/40"}`}>
            {picked[i]?(
              <div>
                <span className="font-mono text-[0.58rem] text-gold mr-2">#{i+1}</span>
                <span className="font-display font-bold text-xl text-tinta">{picked[i].word}</span>
              </div>
            ):(
              <span className="font-display text-2xl text-tinta/20">#{i+1}</span>
            )}
          </div>
        ))}
      </div>
      <p className="text-center font-mono text-xs text-bruma mb-4">{picked.length}/{seqLen} selected</p>
      {/* Word pool */}
      <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
        {available.map(w=>{
          const used=!!picked.find(p=>p.word===w.word);
          return(
            <button key={w.word} onClick={()=>pickWord(w)} disabled={used}
              className={`rounded-xl border p-3 text-left transition-all lift ${
                used?"opacity-30 bg-nube border-tinta/5 cursor-not-allowed":
                "bg-lienzo border-tinta/8 hover:border-gold/50 hover:bg-goldglow/30"}`}>
              <span className="font-display font-bold text-lg text-tinta block">{w.word}</span>
              <span className="text-[0.65rem] text-bruma leading-tight block">{w.def.substring(0,38)}…</span>
            </button>
          );
        })}
      </div>
    </div>
  );

  if(phase==="result") return(
    <div className="max-w-2xl mx-auto text-center pop">
      <RoundBar/>
      <div className="text-5xl mb-4">{success?"🏆":"🔄"}</div>
      <h2 className="font-display font-black text-4xl text-tinta mb-3">
        {success?"Sequence Mastered!":"Not quite"}
      </h2>
      <div className={`rounded-3xl p-5 mb-5 border ${success?"bg-gold/10 border-gold/30":"bg-coral/10 border-coral/30"}`}>
        {success?(
          <div>
            <p className="text-golddark font-semibold mb-1">+{seqLen*20} gold earned.</p>
            {roundNum<maxRound?(
              <p className="text-golddark text-sm">Ready for <b>{seqLen+1} words</b> next round?</p>
            ):(
              <p className="text-golddark font-bold">🎉 You mastered all 6 levels! Maximum recall achieved.</p>
            )}
          </div>
        ):(
          <div className="text-left space-y-1">
            <p className="text-coral font-semibold mb-2">Correct order was:</p>
            {sequence.map((w,i)=>(
              <p key={i} className="text-sm text-tintasoft">
                #{i+1} <b className="text-tinta">{w.word}</b> — {w.def}
              </p>
            ))}
          </div>
        )}
      </div>
      <div className="flex gap-2 justify-center flex-wrap">
        {success&&roundNum<maxRound&&(
          <button onClick={nextRound}
            className="bg-gold text-white font-semibold rounded-full px-8 py-4 shadow-gold hover:bg-golddark transition">
            Next Level — {seqLen+1} words →
          </button>
        )}
        {success&&roundNum>=maxRound&&(
          <button onClick={resetAll}
            className="bg-gold text-white font-semibold rounded-full px-8 py-4 shadow-gold hover:bg-golddark transition">
            Play Again from Start
          </button>
        )}
        {!success&&(
          <button onClick={retryRound}
            className="bg-coral text-white font-semibold rounded-full px-8 py-4 shadow-coral hover:bg-coraldeep transition">
            Retry {seqLen} words
          </button>
        )}
        {success&&(
          <button onClick={retryRound}
            className="border border-tinta/15 text-bruma font-semibold rounded-full px-6 py-4 text-sm hover:border-gold hover:text-golddark transition">
            Replay this round
          </button>
        )}
      </div>
    </div>
  );

  return null;
}

/* ═══════════════════════════════════════════════════════════════
   BILLIONAIRE TEST
═══════════════════════════════════════════════════════════════ */
function BillionaireTest({addScore,setStreak,level}){
  const QUESTIONS=15;
  const[pool]=useState(()=>shuffle(WORDS).slice(0,QUESTIONS));
  const[idx,setIdx]=useState(0);
  const[options,setOptions]=useState([]);
  const[chosen,setChosen]=useState(null);
  const[correct,setCorrect]=useState(0);
  const[results,setResults]=useState([]);
  const[done,setDone]=useState(false);
  const[mode,setMode]=useState("word2def");

  const buildOptions=i=>{
    const t=pool[i];
    const d=shuffle(WORDS.filter(w=>w.word!==t.word)).slice(0,3);
    const type=i%2===0?"word2def":"def2word";
    setMode(type);setOptions(shuffle([t,...d]));setChosen(null);
  };

  useEffect(()=>{if(!done)buildOptions(idx);},[idx]);

  const pick=w=>{
    if(chosen)return;
    setChosen(w);
    const ok=w.word===pool[idx].word;
    setResults(r=>[...r,{q:pool[idx],yours:w,ok}]);
    if(ok){setCorrect(c=>c+1);addScore(20);setStreak(s=>s+1);spawnCoins(4);}
    else{addScore(-5);setStreak(0);}
    setTimeout(()=>{if(idx+1>=QUESTIONS)setDone(true);else setIdx(i=>i+1);},1000);
  };

  if(done){
    const pct=Math.round(correct/QUESTIONS*100);
    if(pct>=90)setTimeout(()=>spawnCoins(25),100);
    const rank=pct>=93?"💎 Diamond Billionaire":pct>=80?"🥇 Gold Billionaire":pct>=65?"🥈 Silver Billionaire":"📈 Rising Millionaire";
    return(
      <div className="max-w-2xl mx-auto pop">
        <div className="text-center mb-6">
          <div className="text-6xl mb-3">🏆</div>
          <h2 className="font-display font-black text-4xl sm:text-5xl text-tinta mb-2">Test Complete</h2>
          <p className="text-tintasoft mb-1">{correct}/{QUESTIONS} · {pct}%</p>
          <div className={`rounded-3xl p-4 inline-block mt-2 border ${pct>=80?"bg-gold/12 border-gold/40":"bg-coral/10 border-coral/30"}`}>
            <p className={`font-display text-2xl font-bold ${pct>=80?"text-golddark":"text-coral"}`}>{rank}</p>
          </div>
        </div>
        <div className="space-y-2 mb-5">
          {results.filter(r=>!r.ok).map((r,i)=>(
            <div key={i} className="bg-white rounded-2xl p-4 border border-coral/20 shadow-soft">
              <p className="font-mono text-[0.6rem] text-coral tracking-widest uppercase mb-1">Review</p>
              <p className="font-display text-xl text-tinta mb-1">{r.q.word}</p>
              <p className="text-sm text-tintasoft">{r.q.def}</p>
              <p className="text-xs text-bruma mt-1">You picked: <b className="text-coral">{r.yours.word}</b></p>
            </div>
          ))}
        </div>
      </div>
    );
  }

  const current=pool[idx];
  const c=CAT_COLORS[current.cat]||CAT_COLORS.Power;
  return(
    <div className="max-w-2xl mx-auto">
      <Hint>No hints. No mercy. Billionaires know their words cold.</Hint>
      <div className="flex justify-between items-center mb-4 font-mono text-sm text-bruma">
        <span>Question {idx+1}/{QUESTIONS}</span>
        <span className="text-gold font-semibold">{correct} correct</span>
      </div>
      <div className="h-2 rounded-full bg-nube overflow-hidden mb-6">
        <div className="h-full meter-gold transition-all" style={{width:`${(idx/QUESTIONS)*100}%`}}/>
      </div>
      <div className="rounded-[28px] bg-lienzo border border-tinta/5 p-6 mb-5 text-center shadow-soft">
        <p className="font-mono text-[0.6rem] tracking-[0.2em] uppercase text-gold mb-3">
          {mode==="word2def"?"What does this word mean?":"Which word matches this definition?"}
        </p>
        <p className="font-display font-black text-3xl sm:text-4xl text-tinta leading-tight">
          {mode==="word2def"?current.word:current.def}
        </p>
        <span className={`inline-block mt-3 font-mono text-xs px-3 py-1 rounded-full border ${c.bg} ${c.border} ${c.text}`}>{current.cat}</span>
      </div>
      <div className="grid grid-cols-1 gap-3">
        {options.map(w=>{
          let s="bg-lienzo border-tinta/8 hover:border-gold/60 hover:bg-goldglow/30";
          if(chosen){if(w.word===current.word)s="bg-gold/15 border-gold/60";else if(w.word===chosen.word)s="bg-coral/15 border-coral/40";else s="opacity-30 bg-nube border-tinta/5";}
          return(
            <button key={w.word} onClick={()=>pick(w)}
              className={`rounded-2xl border p-4 text-left transition-all lift ${s}`}>
              {mode==="word2def"
                ?<span className="text-tintasoft text-sm">{w.def}</span>
                :<span className="font-display font-black text-2xl text-tinta">{w.word}</span>}
            </button>
          );
        })}
      </div>
      {chosen&&(
        <div className={`mt-4 rounded-2xl p-3 text-center font-semibold pop ${chosen.word===current.word?"bg-gold/15 text-golddark":"bg-coral/12 text-coral"}`}>
          {chosen.word===current.word?"🪙 Correct!":`❌ Answer: "${current.word}" — ${current.def}`}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   WORD LAB — Library + Chunks with TTS (merged)
═══════════════════════════════════════════════════════════════ */
function WordLab(){
  const cats=[...new Set(WORDS.map(w=>w.cat))];
  const[filter,setFilter]=useState("All");
  const[view,setView]=useState("chunks"); // chunks | library
  const[search,setSearch]=useState("");
  const[playing,setPlaying]=useState(null); // word key currently playing

  const filtered=useMemo(()=>{
    let ws=filter==="All"?WORDS:WORDS.filter(w=>w.cat===filter);
    if(search.trim()) ws=ws.filter(w=>
      w.word.includes(search.toLowerCase())||w.def.toLowerCase().includes(search.toLowerCase())
    );
    return ws;
  },[filter,search]);

  const speak=useCallback((text,key,rate=0.85)=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    if(playing===key){setPlaying(null);return;}
    const u=new SpeechSynthesisUtterance(text);
    u.lang="en-US";u.rate=rate;u.pitch=1.05;
    const voices=window.speechSynthesis.getVoices();
    const pref=voices.find(v=>v.lang==="en-US"&&(v.name.includes("Samantha")||v.name.includes("Google")||v.name.includes("Natural")));
    if(pref)u.voice=pref;
    setPlaying(key);
    u.onend=()=>setPlaying(null);
    u.onerror=()=>setPlaying(null);
    window.speechSynthesis.speak(u);
  },[playing]);

  return(
    <div className="max-w-4xl mx-auto">
      {/* View toggle */}
      <div className="flex gap-2 mb-5">
        <button onClick={()=>setView("chunks")}
          className={`flex-1 rounded-full py-2.5 text-sm font-semibold transition ${view==="chunks"?"bg-tinta text-paper":"bg-nube text-tintasoft hover:text-gold"}`}>
          🎙️ Chunks + Voice
        </button>
        <button onClick={()=>setView("library")}
          className={`flex-1 rounded-full py-2.5 text-sm font-semibold transition ${view==="library"?"bg-tinta text-paper":"bg-nube text-tintasoft hover:text-gold"}`}>
          📚 Library Grid
        </button>
      </div>

      {/* Search */}
      <input value={search} onChange={e=>setSearch(e.target.value)}
        placeholder="Search a word or definition…"
        className="w-full rounded-2xl border border-tinta/10 bg-white px-4 py-3 text-sm text-tinta outline-none focus:border-gold transition mb-4"/>

      {/* Category filter */}
      <div className="flex gap-2 overflow-x-auto hide-scrollbar mb-5 pb-1">
        {["All",...cats].map(c=>{
          const cc=CAT_COLORS[c];
          return(
            <button key={c} onClick={()=>setFilter(c)}
              className={`shrink-0 rounded-full px-4 py-2 text-sm font-semibold transition ${
                filter===c
                  ?cc?"bg-tinta text-paper":"bg-tinta text-paper"
                  :"bg-nube text-tintasoft hover:text-gold"}`}>
              {c}
            </button>
          );
        })}
      </div>

      <p className="font-mono text-xs text-bruma mb-4">{filtered.length} words</p>

      {/* CHUNKS VIEW */}
      {view==="chunks"&&(
        <div className="space-y-3">
          <Hint>Tap 🔊 Word to hear the word alone. Tap 🔊 Sentence to hear it in context.</Hint>
          {filtered.map(w=>{
            const c=CAT_COLORS[w.cat]||CAT_COLORS.Power;
            const keyWord=`word-${w.word}`;
            const keyChunk=`chunk-${w.word}`;
            return(
              <div key={w.word} className={`rounded-[22px] border p-4 ${c.bg} ${c.border}`}>
                {/* Word row */}
                <div className="flex items-start justify-between gap-3 mb-2">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="font-display font-black text-2xl text-tinta">{w.word}</span>
                    <span className={`font-mono text-[0.58rem] tracking-widest uppercase px-2 py-1 rounded-full border ${c.bg} ${c.border} ${c.text}`}>{w.cat}</span>
                  </div>
                  <button onClick={()=>speak(w.word,keyWord,0.75)}
                    className={`shrink-0 rounded-full px-3 py-1.5 text-xs font-semibold border transition lift ${
                      playing===keyWord?"border-gold/60 bg-goldglow text-golddark speaking":"border-tinta/15 text-bruma hover:border-gold/50 hover:text-gold bg-white/70"}`}
                    aria-label={`Pronounce ${w.word}`}>
                    {playing===keyWord?"⏹ Stop":"🔊 Word"}
                  </button>
                </div>
                {/* Definition */}
                <p className="text-sm text-tintasoft leading-snug mb-3">{w.def}</p>
                {/* Chunk sentence */}
                <div className="bg-white/70 rounded-xl px-4 py-3 flex items-start gap-3">
                  <div className="flex-1">
                    <p className="font-mono text-[0.55rem] uppercase tracking-wider text-bruma mb-1">In use</p>
                    <p className="text-sm font-semibold text-tinta leading-snug italic">"{w.chunk}"</p>
                  </div>
                  <button onClick={()=>speak(w.chunk,keyChunk,0.88)}
                    className={`shrink-0 rounded-full px-3 py-1.5 text-xs font-semibold border transition lift ${
                      playing===keyChunk?"border-gold/60 bg-goldglow text-golddark":"border-tinta/15 text-bruma hover:border-gold/50 hover:text-gold bg-white"}`}
                    aria-label={`Hear example sentence for ${w.word}`}>
                    {playing===keyChunk?"⏹ Stop":"🔊 Sentence"}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* LIBRARY GRID VIEW */}
      {view==="library"&&(
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <Hint>All 100 gold words. Study the patterns. Own the vocabulary.</Hint>
          {filtered.map(w=>{
            const c=CAT_COLORS[w.cat]||CAT_COLORS.Power;
            const keyWord=`lib-${w.word}`;
            return(
              <div key={w.word} className={`rounded-[22px] border p-4 ${c.bg} ${c.border}`}>
                <div className="flex items-start justify-between gap-2 mb-2">
                  <span className="font-display font-black text-2xl text-tinta leading-none">{w.word}</span>
                  <div className="flex items-center gap-1.5 shrink-0">
                    <span className={`font-mono text-[0.55rem] tracking-widest uppercase px-2 py-1 rounded-full border ${c.bg} ${c.border} ${c.text}`}>{w.cat}</span>
                    <button onClick={()=>speak(w.word,keyWord,0.75)}
                      className={`rounded-full w-7 h-7 flex items-center justify-center text-sm border transition ${
                        playing===keyWord?"border-gold/60 bg-goldglow text-golddark":"border-tinta/12 text-bruma hover:border-gold/50 hover:text-gold bg-white/70"}`}
                      aria-label={`Pronounce ${w.word}`}>
                      {playing===keyWord?"⏹":"🔊"}
                    </button>
                  </div>
                </div>
                <p className="text-sm text-tintasoft leading-snug">{w.def}</p>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   INTRO
═══════════════════════════════════════════════════════════════ */
function Intro({setMode}){
  const modes=[
    {id:"vault",  icon:"⚡",title:"Vault Sprint",      desc:"See the definition, pick the right word. 20 rounds, build your gold."},
    {id:"recall", icon:"🧠",title:"Memory Recall",     desc:"Words appear in sequence. Memorize them. Rebuild in exact order. Levels grow from 3 to 8 words."},
    {id:"boss",   icon:"👑",title:"Billionaire Test",  desc:"15-question mixed gauntlet. Word→definition and definition→word, no mercy."},
    {id:"lab",    icon:"📚",title:"Word Lab",          desc:"All 100 words with voice pronunciation. Hear each word and its example sentence. Library + Chunks in one place."},
  ];
  return(
    <div className="max-w-3xl mx-auto">
      <Hint>Four training modes. One goal: think and speak like a billionaire.</Hint>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
        {modes.map(m=>(
          <button key={m.id} onClick={()=>setMode(m.id)}
            className="text-left bg-lienzo border border-tinta/6 rounded-[28px] p-5 sm:p-6 lift hover:border-gold/50 hover:bg-goldglow/30 shadow-soft transition-all">
            <div className="text-4xl mb-3">{m.icon}</div>
            <h3 className="font-display font-bold text-2xl text-tinta mb-2">{m.title}</h3>
            <p className="text-tintasoft text-sm leading-relaxed">{m.desc}</p>
          </button>
        ))}
      </div>
      <div className="mt-6 bg-lienzo border border-gold/20 rounded-[28px] p-5">
        <p className="font-mono text-[0.62rem] tracking-[0.2em] uppercase text-gold mb-2">The 100 Grow Words</p>
        <p className="text-tintasoft text-sm leading-relaxed">
          Curated across 10 power categories: Mindset, Wealth, Leadership, Strategy, Communication, Innovation, Growth, Excellence, Influence, and Power. Each word now comes with a power sentence showing real-world use — with voice.
        </p>
        <button onClick={()=>setMode("lab")}
          className="mt-3 font-mono text-xs text-gold hover:text-golddark transition">
          Open Word Lab — hear all 100 words →
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════════════ */
function App(){
  const[mode,setMode]=useState("intro");
  const[score,setScore]=useState(0);
  const[best,setBest]=useState(0);
  const[streak,setStreak]=useState(0);
  const[level,setLevel]=useState(1);

  const addScore=pts=>{
    setScore(s=>{const n=Math.max(0,s+pts);setBest(b=>Math.max(b,n));return n;});
  };
  const updateStreak=fn=>setStreak(fn);
  useEffect(()=>setLevel(Math.max(1,Math.floor(score/200)+1)),[score]);

  return(
    <div className="font-sans text-tinta min-h-screen relative pb-24 sm:pb-10">
      <div className="fixed inset-0 -z-10" style={{
        background:"radial-gradient(60% 50% at 12% 0%,rgba(201,162,39,0.09),transparent 60%),radial-gradient(55% 55% at 100% 100%,rgba(21,183,158,0.08),transparent 60%),#FCF8F3"
      }}/>
      <div className="max-w-6xl mx-auto px-4 py-7 sm:py-12">

        {/* Header */}
        <header className="text-center mb-8">
          <p className="font-mono text-[0.7rem] tracking-[0.28em] uppercase text-gold mb-3">Vocabulary · Billionaire Edition</p>
          <h1 className="font-display font-black text-4xl sm:text-6xl text-tinta leading-[0.95]">
            Gold Words<br/>
            <span className="italic font-medium text-gold">100 words that grow you.</span>
          </h1>
          <div className="my-5"><WaveBars/></div>
          <p className="text-tintasoft max-w-xl mx-auto leading-relaxed text-sm sm:text-base">
            These are the power words of people who think bigger, communicate sharper, and act faster. Train them until they're automatic — and now hear them aloud.
          </p>
          <div className="mt-5 flex items-center justify-center gap-2 flex-wrap">
            <Pill className="bg-nube text-tinta">Level <b className="text-gold ml-1">{level}</b></Pill>
            <Pill className="bg-nube text-tinta">Gold <b className="text-gold ml-1">🪙{score}</b></Pill>
            <Pill className="bg-nube text-tinta">Best <b className="text-mentadeep ml-1">{best}</b></Pill>
            {streak>=3&&<Pill className="bg-gold/15 text-golddark border border-gold/30">🔥 {streak} streak</Pill>}
          </div>
        </header>

        {/* Nav */}
        <nav className="flex gap-2 overflow-x-auto hide-scrollbar mb-8 pb-1">
          {MODES.map(m=>(
            <button key={m.id} onClick={()=>setMode(m.id)}
              className={`shrink-0 rounded-full px-4 py-2.5 text-sm font-semibold transition ${
                mode===m.id?"bg-tinta text-paper":"bg-nube text-tintasoft hover:text-gold"}`}>
              {m.label}
            </button>
          ))}
        </nav>

        {/* Content */}
        <main key={mode}>
          {mode==="intro"  &&<Intro  setMode={setMode}/>}
          {mode==="vault"  &&<VaultSprint addScore={addScore} setStreak={updateStreak} streak={streak}/>}
          {mode==="recall" &&<MemoryRecall addScore={addScore} setStreak={updateStreak}/>}
          {mode==="boss"   &&<BillionaireTest addScore={addScore} setStreak={updateStreak} level={level}/>}
          {mode==="lab"    &&<WordLab/>}
        </main>

        <footer className="text-center mt-12 text-bruma text-xs sm:text-sm">
          <p>© 2025 ProfGermanDario · Gold Words — Billionaire Vocabulary</p>
          <p className="mt-1 text-gold/70">"Your vocabulary is the ceiling of your thinking."</p>
        </footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
