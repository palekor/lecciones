<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller Verbs I — Game</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --gold: #f0c030;
  --gold-dim: #a07c10;
  --violet: #9b5de5;
  --violet-dim: #5a2a9a;
  --green: #3fb950;
  --red: #f85149;
  --text: #e6edf3;
  --text-muted: #7d8590;
  --border: #30363d;
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.5rem 1rem 3rem;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 700;
  color: var(--gold);
  text-align: center;
  margin-bottom: 0.2rem;
}

.subtitle {
  color: var(--text-muted);
  font-size: 0.9rem;
  text-align: center;
  margin-bottom: 1.5rem;
  font-style: italic;
}

/* ── MODE TABS ── */
.tabs {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  background: var(--surface);
  padding: 0.4rem;
  border-radius: 50px;
  border: 1px solid var(--border);
}

.tab {
  padding: 0.5rem 1.2rem;
  border-radius: 50px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.tab.active {
  background: var(--gold);
  color: #0d1117;
}

.tab:hover:not(.active) { color: var(--text); }

/* ── STATS BAR ── */
.stats {
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  margin-bottom: 1.2rem;
  flex-wrap: wrap;
}

.stat { text-align: center; }
.stat-val { font-size: 1.4rem; font-weight: 900; color: var(--gold); line-height: 1; }
.stat-lbl { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; }

.progress-wrap {
  width: min(500px, 100%);
  height: 6px;
  background: var(--surface2);
  border-radius: 6px;
  margin-bottom: 1.5rem;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--violet), var(--gold));
  border-radius: 6px;
  transition: width 0.4s ease;
}

/* ── MEMORY GAME ── */
#mode-memory {
  width: 100%;
  max-width: 860px;
}

.mem-grid {
  display: grid;
  gap: 8px;
}

.mem-col-9  { grid-template-columns: repeat(9, 1fr); }
.mem-col-8  { grid-template-columns: repeat(8, 1fr); }
.mem-col-6  { grid-template-columns: repeat(6, 1fr); }

@media (max-width: 600px) {
  .mem-col-9  { grid-template-columns: repeat(6, 1fr); }
  .mem-col-8  { grid-template-columns: repeat(5, 1fr); }
  .mem-col-6  { grid-template-columns: repeat(4, 1fr); }
}

.mcard {
  aspect-ratio: 1 / 1.25;
  perspective: 500px;
  cursor: pointer;
}

.mcard-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.32s ease;
  border-radius: var(--radius-sm);
}

.mcard.flipped .mcard-inner,
.mcard.matched .mcard-inner { transform: rotateY(180deg); }

.mcard-face {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  padding: 3px;
  gap: 2px;
}

.mcard-back {
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 1.1rem;
  color: var(--border);
}

.mcard-back::after { content: '✦'; color: var(--gold-dim); font-size: 0.9rem; }

.mcard-front {
  transform: rotateY(180deg);
  border: 2px solid var(--gold);
  background: #1a1600;
}

.mcard-front.es-face {
  border-color: var(--violet);
  background: #120a1e;
}

.mcard-front .mword {
  font-size: clamp(0.58rem, 1.5vw, 0.85rem);
  font-weight: 800;
  text-align: center;
  line-height: 1.1;
  color: var(--text);
}

.mcard-front .mlang {
  font-size: 0.45rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.mcard-front.es-face .mword { color: #d4b0ff; }

.mcard.matched .mcard-front {
  border-color: var(--green) !important;
  background: #0a1a0d !important;
}
.mcard.matched .mcard-front .mword { color: #7adb8a; }

.mcard.wrong .mcard-inner { animation: shake 0.4s ease; }
@keyframes shake {
  0%,100% { transform: rotateY(180deg) translateX(0); }
  25%     { transform: rotateY(180deg) translateX(-5px); }
  75%     { transform: rotateY(180deg) translateX(5px); }
}

.mcard.matched .mcard-inner { animation: pop 0.3s ease; }
@keyframes pop {
  0%   { transform: rotateY(180deg) scale(1); }
  50%  { transform: rotateY(180deg) scale(1.1); }
  100% { transform: rotateY(180deg) scale(1); }
}

.irr-dot {
  position: absolute; top: 3px; right: 4px;
  width: 5px; height: 5px;
  border-radius: 50%; background: var(--red);
}

.mem-controls {
  display: flex; gap: 0.7rem; flex-wrap: wrap;
  justify-content: center; margin-bottom: 1rem;
}

.btn {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.8rem;
  padding: 0.45rem 1.1rem;
  border-radius: 50px;
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.03em;
}
.btn:hover { border-color: var(--gold); color: var(--gold); }
.btn.sel   { border-color: var(--gold); background: var(--gold); color: #0d1117; }
.btn.green { border-color: var(--green); background: var(--green); color: #0d1117; }

.legend {
  display: flex; gap: 1.2rem; justify-content: center;
  flex-wrap: wrap; margin-bottom: 1rem;
}
.leg-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 0.78rem; color: var(--text-muted); font-weight: 700;
}
.leg-swatch {
  width: 12px; height: 12px; border-radius: 3px; border: 2px solid;
}

/* ── QUIZ GAME ── */
#mode-quiz {
  width: min(520px, 100%);
}

.quiz-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem 1.5rem;
  text-align: center;
}

.quiz-prompt {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.4rem, 5vw, 2.2rem);
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 0.4rem;
  letter-spacing: 0.02em;
}

.quiz-direction {
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
}

.quiz-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.7rem;
}

.qopt {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: clamp(0.85rem, 2.5vw, 1rem);
  padding: 0.8rem 0.5rem;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  transition: all 0.18s;
  line-height: 1.2;
}

.qopt:hover:not(:disabled) {
  border-color: var(--gold);
  background: #1e1800;
  color: var(--gold);
  transform: translateY(-2px);
}

.qopt.correct  { border-color: var(--green); background: #0a1a0d; color: var(--green); }
.qopt.wrong    { border-color: var(--red);   background: #1a0a0d; color: var(--red); }
.qopt:disabled { cursor: default; }

.quiz-feedback {
  margin-top: 1.2rem;
  font-size: 1rem;
  font-weight: 800;
  min-height: 1.5rem;
  letter-spacing: 0.02em;
}

.quiz-counter {
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 700;
  margin-bottom: 0.8rem;
  letter-spacing: 0.04em;
}

/* ── FLASH GAME ── */
#mode-flash {
  width: min(480px, 100%);
}

.flash-card-wrap {
  perspective: 800px;
  width: 100%;
  margin-bottom: 1rem;
  cursor: pointer;
}

.flash-card {
  width: 100%;
  min-height: 180px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.45s ease;
  border-radius: var(--radius);
}

.flash-card.revealed { transform: rotateY(180deg); }

.flash-face {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: var(--radius);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  padding: 1.5rem;
  gap: 0.5rem;
}

.flash-front {
  background: var(--surface);
  border: 2px solid var(--gold);
}

.flash-back {
  background: var(--surface);
  border: 2px solid var(--violet);
  transform: rotateY(180deg);
}

.flash-word {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 6vw, 2.8rem);
  font-weight: 700;
  color: var(--gold);
}

.flash-back .flash-word { color: #d4b0ff; }

.flash-hint {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.flash-irr-badge {
  font-size: 0.7rem;
  font-weight: 800;
  background: var(--red);
  color: white;
  border-radius: 50px;
  padding: 0.2rem 0.7rem;
  letter-spacing: 0.04em;
}

.flash-nav {
  display: flex; gap: 0.7rem; justify-content: center;
  flex-wrap: wrap;
}

.flash-rating {
  display: flex; gap: 0.6rem; justify-content: center; margin-top: 0.8rem;
  flex-wrap: wrap;
}

.frate {
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.8rem;
  padding: 0.4rem 1rem;
  border-radius: 50px;
  border: 2px solid;
  background: transparent;
  cursor: pointer;
  transition: all 0.18s;
}
.frate-easy   { border-color: var(--green); color: var(--green); }
.frate-medium { border-color: var(--gold);  color: var(--gold); }
.frate-hard   { border-color: var(--red);   color: var(--red); }
.frate-easy:hover   { background: var(--green); color: #0d1117; }
.frate-medium:hover { background: var(--gold);  color: #0d1117; }
.frate-hard:hover   { background: var(--red);   color: white; }
.frate:disabled { opacity: 0.3; cursor: default; }

.flash-pos {
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 700;
  margin-bottom: 0.8rem;
}

/* ── WIN SCREEN ── */
.win-screen {
  display: none;
  text-align: center;
  padding: 2.5rem 1.5rem;
  background: var(--surface);
  border: 2px solid var(--gold);
  border-radius: var(--radius);
  max-width: 400px;
  margin: 1rem auto;
}
.win-screen.show { display: block; }
.win-screen h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--gold); margin-bottom: 0.5rem; }
.win-screen p { color: var(--text-muted); margin-bottom: 1.2rem; font-weight: 700; }

.hidden { display: none !important; }

</style>
</head>
<body>

<h1>Taller Verbs I</h1>
<p class="subtitle">36 verbs · 3 game modes · all pairs covered</p>

<div class="tabs">
  <button class="tab active" onclick="switchMode('memory')">🃏 Memory</button>
  <button class="tab" onclick="switchMode('quiz')">🎯 Quiz</button>
  <button class="tab" onclick="switchMode('flash')">⚡ Flashcards</button>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="st-score">0</div><div class="stat-lbl" id="st-score-lbl">Matched</div></div>
  <div class="stat"><div class="stat-val" id="st-total">0</div><div class="stat-lbl">Total</div></div>
  <div class="stat"><div class="stat-val" id="st-acc">—</div><div class="stat-lbl">Accuracy</div></div>
</div>

<div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<!-- ═══════════════ MEMORY MODE ═══════════════ -->
<div id="mode-memory">
  <div class="mem-controls">
    <button class="btn sel" id="mbtn-12" onclick="memStart(12)">12 pairs</button>
    <button class="btn"     id="mbtn-24" onclick="memStart(24)">24 pairs</button>
    <button class="btn"     id="mbtn-36" onclick="memStart(36)">All 36</button>
    <button class="btn green" onclick="memRestart()">↺ Shuffle</button>
  </div>
  <div class="legend">
    <div class="leg-item"><div class="leg-swatch" style="border-color:var(--gold)"></div>English</div>
    <div class="leg-item"><div class="leg-swatch" style="border-color:var(--violet)"></div>Español</div>
    <div class="leg-item"><div style="width:8px;height:8px;border-radius:50%;background:var(--red)"></div>Irregular</div>
  </div>
  <div class="mem-grid mem-col-8" id="mem-grid"></div>
  <div class="win-screen" id="mem-win">
    <h2>🏆 ¡Excelente!</h2>
    <p id="mem-win-msg"></p>
    <button class="btn green" onclick="memRestart()">Play Again</button>
  </div>
</div>

<!-- ═══════════════ QUIZ MODE ═══════════════ -->
<div id="mode-quiz" class="hidden">
  <div class="quiz-card">
    <div class="quiz-counter" id="q-counter">Question 1 of 36</div>
    <div class="quiz-prompt" id="q-prompt">—</div>
    <div class="quiz-direction" id="q-dir">Choose the Spanish</div>
    <div class="quiz-options" id="q-opts"></div>
    <div class="quiz-feedback" id="q-fb"></div>
  </div>
  <div style="display:flex;gap:.7rem;justify-content:center;margin-top:1rem;flex-wrap:wrap">
    <button class="btn" onclick="quizToggleDir()">🔄 Flip Direction</button>
    <button class="btn green" onclick="quizStart()">↺ Restart</button>
  </div>
</div>

<!-- ═══════════════ FLASHCARD MODE ═══════════════ -->
<div id="mode-flash" class="hidden">
  <div class="flash-pos" id="fl-pos">Card 1 of 36</div>
  <div class="flash-card-wrap" onclick="flashFlip()">
    <div class="flash-card" id="fl-card">
      <div class="flash-face flash-front">
        <div class="flash-hint">English — tap to reveal</div>
        <div class="flash-word" id="fl-en">—</div>
        <div id="fl-irr-badge"></div>
      </div>
      <div class="flash-face flash-back">
        <div class="flash-hint">Spanish</div>
        <div class="flash-word" id="fl-es">—</div>
      </div>
    </div>
  </div>
  <div class="flash-rating" id="fl-rating">
    <button class="frate frate-hard"   onclick="flashRate('hard')"   disabled>😅 Hard</button>
    <button class="frate frate-medium" onclick="flashRate('medium')" disabled>🤔 Medium</button>
    <button class="frate frate-easy"   onclick="flashRate('easy')"   disabled>✅ Easy</button>
  </div>
  <div class="flash-nav" style="margin-top:0.8rem">
    <button class="btn" onclick="flashPrev()">← Prev</button>
    <button class="btn green" onclick="flashShuffle()">↺ Shuffle</button>
    <button class="btn" onclick="flashNext()">Next →</button>
  </div>
  <div style="text-align:center;margin-top:1rem;font-size:0.8rem;color:var(--text-muted);font-weight:700">
    Hard: <span id="fl-hard" style="color:var(--red)">0</span> &nbsp;|&nbsp;
    Medium: <span id="fl-med" style="color:var(--gold)">0</span> &nbsp;|&nbsp;
    Easy: <span id="fl-easy" style="color:var(--green)">0</span>
  </div>
</div>

<script>
const VERBS = [
  {en:'study',   es:'estudiar',  irr:false},
  {en:'read',    es:'leer',      irr:false},
  {en:'look',    es:'mirar',     irr:false},
  {en:'do',      es:'hacer',     irr:true},
  {en:'have',    es:'tener',     irr:true},
  {en:'know',    es:'saber',     irr:true},
  {en:'carry',   es:'llevar',    irr:false},
  {en:'decide',  es:'decidir',   irr:false},
  {en:'wash',    es:'lavar',     irr:false},
  {en:'eat',     es:'comer',     irr:true},
  {en:'go',      es:'ir',        irr:true},
  {en:'call',    es:'llamar',    irr:false},
  {en:'want',    es:'querer',    irr:true},
  {en:'can',     es:'poder',     irr:true},
  {en:'search',  es:'buscar',    irr:false},
  {en:'cook',    es:'cocinar',   irr:false},
  {en:'work',    es:'trabajar',  irr:false},
  {en:'live',    es:'vivir',     irr:false},
  {en:'walk',    es:'caminar',   irr:false},
  {en:'think',   es:'pensar',    irr:false},
  {en:'listen',  es:'escuchar',  irr:false},
  {en:'ask',     es:'preguntar', irr:false},
  {en:'use',     es:'usar',      irr:false},
  {en:'see',     es:'ver',       irr:true},
  {en:'sell',    es:'vender',    irr:false},
  {en:'run',     es:'correr',    irr:false},
  {en:'sing',    es:'cantar',    irr:false},
  {en:'paint',   es:'pintar',    irr:false},
  {en:'dance',   es:'bailar',    irr:false},
  {en:'wish',    es:'desear',    irr:false},
  {en:'take',    es:'tomar',     irr:false},
  {en:'buy',     es:'comprar',   irr:false},
  {en:'play',    es:'jugar',     irr:false},
  {en:'build',   es:'construir', irr:false},
  {en:'love',    es:'amar',      irr:false},
  {en:'like',    es:'gustar',    irr:false},
];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ─── STATS ─────────────────────────────────────────
let stScore=0,stTotal=36,stAttempts=0;

function setStats(score,total,attempts){
  stScore=score;stTotal=total;stAttempts=attempts;
  document.getElementById('st-score').textContent=score;
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-acc').textContent=attempts>0?Math.round(score/attempts*100)+'%':'—';
  document.getElementById('progress').style.width=(score/total*100)+'%';
}

// ─── MODE SWITCH ────────────────────────────────────
let currentMode='memory';
function switchMode(m){
  currentMode=m;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['memory','quiz','flash'][i]===m));
  document.getElementById('mode-memory').classList.toggle('hidden',m!=='memory');
  document.getElementById('mode-quiz').classList.toggle('hidden',m!=='quiz');
  document.getElementById('mode-flash').classList.toggle('hidden',m!=='flash');
  document.getElementById('st-score-lbl').textContent=m==='memory'?'Matched':m==='quiz'?'Correct':'Seen';
  if(m==='quiz'&&!quizInit){quizStart();}
  if(m==='flash'&&!flashInit){flashLoad();}
}

// ═══════════════════════════════════════════════════
//  MEMORY GAME
// ═══════════════════════════════════════════════════
let memCount=12,memCards=[],memFlipped=[],memMatched=0,memAttempts=0,memLock=false;

function memStart(n){
  memCount=n;
  ['12','24','36'].forEach(x=>{
    const b=document.getElementById('mbtn-'+x);
    if(b) b.classList.toggle('sel',x==n);
  });
  memFlipped=[];memMatched=0;memAttempts=0;memLock=false;
  document.getElementById('mem-win').classList.remove('show');

  const col=n<=12?'mem-col-6':n<=24?'mem-col-8':'mem-col-9';
  const grid=document.getElementById('mem-grid');
  grid.className='mem-grid '+col;

  const selected=shuffle(VERBS).slice(0,n);
  memCards=[];
  selected.forEach((v,i)=>{
    memCards.push({id:i*2,  pairId:i,lang:'en',text:v.en,irr:v.irr});
    memCards.push({id:i*2+1,pairId:i,lang:'es',text:v.es,irr:v.irr});
  });
  memCards=shuffle(memCards);

  grid.innerHTML='';
  memCards.forEach(c=>{
    const el=document.createElement('div');
    el.className='mcard';
    el.dataset.id=c.id;
    el.innerHTML=`<div class="mcard-inner">
      <div class="mcard-face mcard-back"></div>
      <div class="mcard-face mcard-front ${c.lang==='es'?'es-face':''}">
        ${c.irr?'<div class="irr-dot"></div>':''}
        <div class="mword">${c.text}</div>
        <div class="mlang">${c.lang==='en'?'EN':'ES'}</div>
      </div>
    </div>`;
    el.addEventListener('click',()=>memClick(el,c));
    grid.appendChild(el);
  });
  setStats(0,n,0);
}

function memClick(el,card){
  if(memLock||el.classList.contains('flipped')||el.classList.contains('matched')||memFlipped.length===2)return;
  el.classList.add('flipped');
  memFlipped.push({el,card});
  if(memFlipped.length===2){
    memAttempts++;
    memLock=true;
    const[a,b]=memFlipped;
    if(a.card.pairId===b.card.pairId&&a.card.lang!==b.card.lang){
      setTimeout(()=>{
        a.el.classList.add('matched');b.el.classList.add('matched');
        a.el.classList.remove('flipped');b.el.classList.remove('flipped');
        memMatched++;memFlipped=[];memLock=false;
        setStats(memMatched,memCount,memAttempts);
        if(memMatched===memCount)memWin();
      },450);
    }else{
      setTimeout(()=>{
        a.el.classList.add('wrong');b.el.classList.add('wrong');
        setTimeout(()=>{
          a.el.classList.remove('flipped','wrong');b.el.classList.remove('flipped','wrong');
          memFlipped=[];memLock=false;
          setStats(memMatched,memCount,memAttempts);
        },600);
      },750);
    }
  }
}

function memWin(){
  const acc=Math.round(memMatched/memAttempts*100);
  document.getElementById('mem-win-msg').textContent=`All ${memCount} pairs in ${memAttempts} attempts — ${acc}% accuracy!`;
  document.getElementById('mem-win').classList.add('show');
}

function memRestart(){memStart(memCount);}

//  QUIZ GAME
// ═══════════════════════════════════════════════════
let quizDeck=[],quizIdx=0,quizDir='es',quizCorrect=0,quizInit=false,quizAnswered=false;

function quizStart(){
  quizInit=true;
  quizDeck=shuffle([...VERBS]);
  quizIdx=0;quizCorrect=0;quizAnswered=false;
  setStats(0,36,0);
  quizShow();
}

function quizToggleDir(){
  quizDir=quizDir==='es'?'en':'es';
  quizShow();
}

function quizShow(){
  if(quizIdx>=quizDeck.length){quizEndScreen();return;}
  const v=quizDeck[quizIdx];
  quizAnswered=false;
  document.getElementById('q-counter').textContent=`Question ${quizIdx+1} of ${quizDeck.length}`;
  document.getElementById('q-fb').textContent='';
  document.getElementById('q-fb').style.color='';

  if(quizDir==='es'){
    document.getElementById('q-prompt').textContent=v.en;
    document.getElementById('q-dir').textContent='Choose the Spanish translation';
  }else{
    document.getElementById('q-prompt').textContent=v.es;
    document.getElementById('q-dir').textContent='Choose the English translation';
  }

  const wrongPool=VERBS.filter(x=>x.en!==v.en);
  const wrong=shuffle(wrongPool).slice(0,3);
  const options=shuffle([v,...wrong]);
  const container=document.getElementById('q-opts');
  container.innerHTML='';
  options.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='qopt';
    btn.textContent=quizDir==='es'?opt.es:opt.en;
    btn.onclick=()=>quizAnswer(btn,opt,v);
    container.appendChild(btn);
  });
}

function quizAnswer(btn,chosen,correct){
  if(quizAnswered)return;
  quizAnswered=true;
  const isRight=chosen.en===correct.en;
  const fb=document.getElementById('q-fb');
  document.querySelectorAll('.qopt').forEach(b=>{
    b.disabled=true;
    const val=quizDir==='es'?b.textContent:b.textContent;
    const isCorrectBtn=quizDir==='es'?b.textContent===correct.es:b.textContent===correct.en;
    if(isCorrectBtn)b.classList.add('correct');
  });
  if(isRight){
    btn.classList.add('correct');
    fb.textContent='✅ Correct!';
    fb.style.color='var(--green)';
    quizCorrect++;
  }else{
    btn.classList.add('wrong');
    fb.textContent=`❌  ${quizDir==='es'?correct.en+' → '+correct.es:correct.es+' → '+correct.en}`;
    fb.style.color='var(--red)';
  }
  setStats(quizCorrect,36,quizIdx+1);
  setTimeout(()=>{quizIdx++;quizShow();},1400);
}

function quizEndScreen(){
  const acc=Math.round(quizCorrect/36*100);
  document.getElementById('q-prompt').textContent='🏆 Done!';
  document.getElementById('q-dir').textContent='';
  document.getElementById('q-opts').innerHTML='';
  document.getElementById('q-counter').textContent=`${quizCorrect}/36 correct — ${acc}%`;
  document.getElementById('q-fb').textContent='Tap Restart to go again';
  document.getElementById('q-fb').style.color='var(--gold)';
}

//  FLASHCARD MODE
// ═══════════════════════════════════════════════════
let flashDeck=[],flashIdx=0,flashRevealed=false,flashInit=false;
let flashRatings={easy:0,medium:0,hard:0};

function flashLoad(){
  flashInit=true;
  flashDeck=shuffle([...VERBS]);
  flashIdx=0;flashRevealed=false;
  flashRatings={easy:0,medium:0,hard:0};
  setStats(0,36,0);
  flashShow();
}

function flashShuffle(){flashLoad();}

function flashShow(){
  const v=flashDeck[flashIdx];
  flashRevealed=false;
  document.getElementById('fl-card').classList.remove('revealed');
  document.getElementById('fl-en').textContent=v.en;
  document.getElementById('fl-es').textContent=v.es;
  document.getElementById('fl-irr-badge').innerHTML=v.irr?'<div class="flash-irr-badge">irregular</div>':'';
  document.getElementById('fl-pos').textContent=`Card ${flashIdx+1} of ${flashDeck.length}`;
  document.querySelectorAll('.frate').forEach(b=>b.disabled=true);
  setStats(flashIdx+1,36,flashIdx+1);
}

function flashFlip(){
  flashRevealed=!flashRevealed;
  document.getElementById('fl-card').classList.toggle('revealed',flashRevealed);
  document.querySelectorAll('.frate').forEach(b=>b.disabled=!flashRevealed);
}

function flashRate(r){
  flashRatings[r]++;
  document.getElementById('fl-hard').textContent=flashRatings.hard;
  document.getElementById('fl-med').textContent=flashRatings.medium;
  document.getElementById('fl-easy').textContent=flashRatings.easy;
  flashNext();
}

function flashNext(){
  if(flashIdx<flashDeck.length-1){flashIdx++;flashShow();}
  else{
    document.getElementById('fl-pos').textContent='All cards done! Tap Shuffle to restart.';
    document.querySelectorAll('.frate').forEach(b=>b.disabled=true);
  }
}

function flashPrev(){
  if(flashIdx>0){flashIdx--;flashShow();}
}

memStart(12);
