    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Math Trainer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        .subtitle {

            margin-bottom: 30px;
            font-size: 0.9em;

        .level-badge {

        .level-badge span {
            display: inline-block;

            text-align: center;
            margin-bottom: 30px;
        }
        
        .problem {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            border-radius: 10px;
        }
        
        .hint {
            background: #fff3cd;
            border: 2px solid #ffc107;

            background: #6c757d;

        .feedback {

            display: none;

        .feedback.correct {

            border: 2px solid #28a745;
        }
        
        .feedback.incorrect {
            background: #f8d7da;

            border: 2px solid #dc3545;

        .level-up {
            background: #d1ecf1;

            font-size: 1.2em;
            color: #ff6b6b;

            font-weight: bold;

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .pulse {
            animation: pulse 0.5s;
        }
        
        @keyframes levelUp {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1); }
        }
        
        .level-up-animation {
            animation: levelUp 0.6s;
        }

</head>
<body>
    <div class="container">
        <h1>⚡ Mental Math Trainer</h1>
        <div class="subtitle">Master multiplication &amp; division by 5</div>
        
        <div class="level-badge">
            <span id="level-display">Level 1</span>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">30</div>
            </div>
            <div class="stat">
                <div class="stat-label">Streak</div>
                <div class="stat-value" id="streak">2</div>
            </div>
            <div class="stat">
                <div class="stat-label">Best</div>
                <div class="stat-value" id="best">2</div>
            </div>
        </div>
        
        <div class="game-area">
            <div class="problem" id="problem">96 ÷ 5 = ?</div>
            
            <button class="hint-btn" id="hint-btn" onclick="toggleHint()">💡 Show Hint</button>
            
            <div class="hint" id="hint" style="display: none;">💡 Tip: Double 96 (= 192) and move decimal left → 19.2</div>
            
            <div class="feedback correct" id="feedback" style="display: none;">✅ Correct! 22 × 5 = 110</div>
            
            <input type="number" class="answer-input" id="answer" placeholder="Enter your answer" step="any">
            
            <button class="btn btn-submit" onclick="checkAnswer()">Submit Answer</button>
            <button class="btn btn-skip" onclick="nextProblem()">Skip / Next Problem</button>
        </div>
    </div>

    <script>
        let currentNumber = 0;
        let currentOperation = '×';
        let correctAnswer = 0;
        let score = 0;
        let streak = 0;
        let bestStreak = 0;
        let level = 1;
        let hintVisible = false;

        function getLevel() {
            return Math.floor(score / 100) + 1;
        }

        function updateLevel() {
            const newLevel = getLevel();
            if (newLevel > level) {
                level = newLevel;
                const levelDisplay = document.getElementById('level-display');
                levelDisplay.textContent = `Level ${level}`;
                levelDisplay.classList.add('level-up-animation');
                
                const feedback = document.getElementById('feedback');
                feedback.textContent = `🎉 LEVEL UP! Now at Level ${level}!`;
                feedback.className = 'feedback level-up';
                feedback.style.display = 'block';
                
                setTimeout(() => {
                    levelDisplay.classList.remove('level-up-animation');
                }, 600);
                
                setTimeout(() => {
                    feedback.style.display = 'none';
                }, 2000);
            }
        }

        function generateProblem() {
            hintVisible = false;
            document.getElementById('hint').style.display = 'none';
            document.getElementById('hint-btn').textContent = '💡 Show Hint';
            
            // Level 1: Even numbers 10-98
            // Level 2: Even numbers 10-198
            // Level 3+: Include odd numbers
            
            if (level === 1) {
                currentNumber = (Math.floor(Math.random() * 45) + 5) * 2; // 10-98 even
            } else if (level === 2) {
                currentNumber = (Math.floor(Math.random() * 95) + 5) * 2; // 10-198 even
            } else {
                // Level 3+: Include odd numbers
                const maxNumber = 100 + (level - 3) * 50;
                currentNumber = Math.floor(Math.random() * maxNumber) + 10;
            }
            
            currentOperation = Math.random() > 0.5 ? '×' : '÷';
            
            if (currentOperation === '×') {
                correctAnswer = (currentNumber / 2) * 10;
                document.getElementById('hint').innerHTML = 
                    `💡 Tip: Take half of ${currentNumber} (= ${currentNumber / 2}) and add a 0 → ${correctAnswer}`;
            } else {
                correctAnswer = (currentNumber * 2) / 10;
                document.getElementById('hint').innerHTML = 
                    `💡 Tip: Double ${currentNumber} (= ${currentNumber * 2}) and move decimal left → ${correctAnswer}`;
            }
            
            document.getElementById('problem').textContent = `${currentNumber} ${currentOperation} 5 = ?`;
            document.getElementById('answer').value = '';
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('answer').focus();
        }

        function toggleHint() {
            hintVisible = !hintVisible;
            const hint = document.getElementById('hint');
            const hintBtn = document.getElementById('hint-btn');
            
            if (hintVisible) {
                hint.style.display = 'block';
                hintBtn.textContent = '🙈 Hide Hint';
            } else {
                hint.style.display = 'none';
                hintBtn.textContent = '💡 Show Hint';
            }
        }

        function checkAnswer() {
            const userAnswer = parseFloat(document.getElementById('answer').value);
            const feedback = document.getElementById('feedback');
            
            if (isNaN(userAnswer)) {
                feedback.textContent = '⚠️ Please enter a number!';
                feedback.className = 'feedback incorrect';
                feedback.style.display = 'block';
                return;
            }
            
            if (Math.abs(userAnswer - correctAnswer) < 0.01) {
                score += 10;
                streak++;
                if (streak > bestStreak) {
                    bestStreak = streak;
                }
                
                feedback.textContent = `✅ Correct! ${currentNumber} ${currentOperation} 5 = ${correctAnswer}`;
                feedback.className = 'feedback correct';
                feedback.style.display = 'block';
                
                document.getElementById('score').textContent = score;
                document.getElementById('score').classList.add('pulse');
                setTimeout(() => {
                    document.getElementById('score').classList.remove('pulse');
                }, 500);
                
                updateLevel();
                setTimeout(nextProblem, 1500);
            } else {
                streak = 0;
                feedback.textContent = `❌ Not quite. The correct answer is ${correctAnswer}`;
                feedback.className = 'feedback incorrect';
                feedback.style.display = 'block';
                
                setTimeout(nextProblem, 2500);
            }
            
            updateStats();
        }

        function nextProblem() {
            generateProblem();
        }

        function updateStats() {
            document.getElementById('streak').textContent = streak;
            document.getElementById('best').textContent = bestStreak;
        }

        document.getElementById('answer').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        generateProblem();
    </script>

</body></html>
